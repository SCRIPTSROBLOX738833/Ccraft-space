<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCRAFT SPACE | بروفايل</title>
    <link rel="stylesheet" href="styles.css">
    <style>

        /* ============================================================
           Profile — Styles خاصة
           ============================================================ */

        /* بطاقة البروفايل الرئيسية */

        .profile-hero {
            max-width: 820px;
            margin: 32px auto 0;
            padding: 0 20px;
        }

        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 36px 32px;
            display: flex;
            align-items: center;
            gap: 28px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease both;
        }

        /* خط علوي gradient */
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: var(--accent-gradient);
        }

        /* أفاتار */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: 900;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
            text-transform: uppercase;
        }

        .profile-info {
            flex: 1;
            min-width: 0;
        }

        .profile-info h2 {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 4px;
            background: none;
            -webkit-text-fill-color: unset;
        }

        .profile-info .profile-email {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-bottom: 14px;
        }

        .profile-info .join-date {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* أزرار البروفايل */
        .profile-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }


        /* ============================================================
           إحصائيات
           ============================================================ */

        .stats-grid {
            max-width: 820px;
            margin: 20px auto 0;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            animation: fadeIn 0.5s 0.1s ease both;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 22px 20px;
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px);
        }

        .stat-card .stat-num {
            font-size: 2rem;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            margin-bottom: 4px;
        }

        .stat-card .stat-label {
            color: var(--text-muted);
            font-size: 0.82rem;
            font-weight: 700;
        }


        /* ============================================================
           سكربتات اليوزر
           ============================================================ */

        .section-title {
            max-width: 820px;
            margin: 36px auto 16px;
            padding: 0 20px;
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        #userScripts {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 20px 80px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* كارد سكربت مصغر */
        .mini-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: var(--transition);
            animation: fadeIn 0.4s ease both;
        }

        .mini-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.4);
        }

        .mini-card-info {
            flex: 1;
            min-width: 0;
        }

        .mini-card-info h3 {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-card-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .mini-card-meta span {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .cat-badge {
            background: var(--primary-dim);
            color: #b48bf8;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .mini-card-stats {
            display: flex;
            gap: 14px;
            font-size: 0.85rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* زر حذف */
        .delete-btn {
            background: rgba(248, 113, 113, 0.08);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, 0.2);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 0.8rem;
            margin: 0;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 14px rgba(248,113,113,0.4);
            filter: none;
            transform: none;
        }

        /* empty state */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .empty-state p {
            font-size: 1rem;
            margin-bottom: 20px;
        }


        /* stagger */
        .mini-card:nth-child(1)  { animation-delay: 0.05s; }
        .mini-card:nth-child(2)  { animation-delay: 0.10s; }
        .mini-card:nth-child(3)  { animation-delay: 0.15s; }
        .mini-card:nth-child(4)  { animation-delay: 0.20s; }
        .mini-card:nth-child(5)  { animation-delay: 0.25s; }


        @media (max-width: 600px) {

            .profile-card {
                flex-direction: column;
                text-align: center;
            }

            .profile-actions {
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .stat-card .stat-num { font-size: 1.5rem; }

            .mini-card {
                flex-wrap: wrap;
            }

            .mini-card-stats {
                width: 100%;
            }

        }

    </style>
</head>
<body>

    <header>
        <button onclick="location.href='scripts.html'">📜 السكربتات</button>
        <button class="nav-button" onclick="location.href='index.html'">رجوع للصفحة الرئيسية</button>
    </header>


    <!-- بطاقة البروفايل -->
    <div class="profile-hero">
        <div class="profile-card">
            <div class="avatar" id="avatar">؟</div>
            <div class="profile-info">
                <h2 id="username">جارٍ التحميل...</h2>
                <div class="profile-email" id="userEmail"></div>
                <div class="join-date" id="joinDate"></div>
            </div>
            <div class="profile-actions">
                <button id="logoutBtn">🚪 خروج</button>
            </div>
        </div>
    </div>


    <!-- إحصائيات -->
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-num" id="totalScripts">0</span>
            <span class="stat-label">سكربت</span>
        </div>
        <div class="stat-card">
            <span class="stat-num" id="totalLikes">0</span>
            <span class="stat-label">إجمالي اللايكات</span>
        </div>
        <div class="stat-card">
            <span class="stat-num" id="avgRating">—</span>
            <span class="stat-label">متوسط التقييم</span>
        </div>
    </div>


    <!-- سكربتات اليوزر -->
    <div class="section-title">📜 سكربتاتي</div>

    <div id="userScripts">
        <div class="empty-state"><p>جارٍ التحميل...</p></div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
            authDomain: "ccraft-space-scripts.firebaseapp.com",
            databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
            projectId: "ccraft-space-scripts",
            storageBucket: "ccraft-space-scripts.firebasestorage.app",
            messagingSenderId: "816078027492",
            appId: "1:816078027492:web:6472cce474078fd4d90af1",
            measurementId: "G-MHDM7YYYBN"
        };

        const app  = initializeApp(firebaseConfig);
        const db   = getDatabase(app);
        const auth = getAuth(app);

        // تحقق من تسجيل الدخول
        onAuthStateChanged(auth, user => {
            if (!user) {
                location.href = 'login.html';
                return;
            }
            renderProfile(user);
            loadUserScripts(user);
        });

        function renderProfile(user) {
            const name  = user.email.split('@')[0];
            const email = user.email;

            document.getElementById('username').innerText  = name;
            document.getElementById('userEmail').innerText = email;
            document.getElementById('avatar').innerText    = name.charAt(0).toUpperCase();

            // تاريخ الانضمام
            const created = new Date(parseInt(user.metadata.createdAt));
            document.getElementById('joinDate').innerText =
                `انضم في: ${created.toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' })}`;
        }

        async function loadUserScripts(user) {
            const username = user.email.split('@')[0];
            const snap = await get(ref(db, 'scripts'));
            const container = document.getElementById('userScripts');
            container.innerHTML = '';

            if (!snap.exists()) {
                showEmpty(container);
                return;
            }

            const all = snap.val();
            const mine = Object.entries(all).filter(([, s]) =>
                s.author === username || s.authorEmail === user.email
            );

            // إحصائيات
            document.getElementById('totalScripts').innerText = mine.length;

            let totalLikes  = 0;
            let totalRating = 0;
            let totalVotes  = 0;

            mine.forEach(([, s]) => {
                totalLikes  += s.likes  || 0;
                totalRating += s.rating || 0;
                totalVotes  += s.votes  || 0;
            });

            document.getElementById('totalLikes').innerText = totalLikes;
            document.getElementById('avgRating').innerText  =
                totalVotes > 0 ? (totalRating / totalVotes).toFixed(1) : '—';

            if (mine.length === 0) {
                showEmpty(container);
                return;
            }

            // ترتيب الأحدث أولاً
            mine.sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

            mine.forEach(([id, s], i) => {
                const avg = s.votes ? (s.rating / s.votes).toFixed(1) : '—';
                const card = document.createElement('div');
                card.className = 'mini-card';
                card.style.animationDelay = `${i * 0.06}s`;

                card.innerHTML = `
                    <div class="mini-card-info" onclick="location.href='script.html?id=${id}'" style="cursor:pointer">
                        <h3>${s.title || 'بدون عنوان'}</h3>
                        <div class="mini-card-meta">
                            <span class="cat-badge">${s.category || 'عام'}</span>
                            <span>👍 ${s.likes || 0}</span>
                            <span>⭐ ${avg}</span>
                        </div>
                    </div>
                    <div class="mini-card-stats"></div>
                    <button class="delete-btn" data-id="${id}">🗑️ حذف</button>
                `;

                // حذف السكربت
                card.querySelector('.delete-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (!confirm('هل تريد حذف هذا السكربت نهائياً؟')) return;
                    await remove(ref(db, `scripts/${id}`));
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.95)';
                    card.style.transition = '0.3s';
                    setTimeout(() => {
                        card.remove();
                        loadUserScripts(user);
                    }, 300);
                });

                container.appendChild(card);
            });
        }

        function showEmpty(container) {
            container.innerHTML = `
                <div class="empty-state">
                    <p>ما نشرتش أي سكربت لحد دلوقتي 😅</p>
                    <button onclick="location.href='publish.html'" style="background:var(--accent-gradient);color:white;border:none;border-radius:50px;padding:13px 30px;font-family:Tajawal,sans-serif;font-weight:800;cursor:pointer;box-shadow:0 8px 20px rgba(139,92,246,0.3)">📤 انشر أول سكربت</button>
                </div>
            `;
        }

        // تسجيل خروج
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            localStorage.removeItem('currentUser');
            location.href = 'index.html';
        });
    </script>

</body>
</html>
