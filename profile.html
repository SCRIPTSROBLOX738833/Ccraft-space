<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCRAFT SPACE | بروفايل</title>
    <link rel="stylesheet" href="styles.css">
    <style>

        /* ============================================================
           Profile Card
           ============================================================ */

        .profile-hero {
            max-width: 820px;
            margin: 32px auto 0;
            padding: 0 20px;
        }

        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 36px 32px;
            display: flex;
            align-items: center;
            gap: 28px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease both;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: var(--accent-gradient);
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: 900;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
        }

        .profile-info { flex: 1; min-width: 0; }

        .profile-info h2 {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 4px;
            background: none;
            -webkit-text-fill-color: unset;
        }

        .profile-email { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 6px; }
        .join-date     { color: var(--text-muted); font-size: 0.8rem; }
        .profile-actions { display: flex; gap: 10px; flex-shrink: 0; }


        /* ============================================================
           Stats
           ============================================================ */

        .stats-grid {
            max-width: 820px;
            margin: 20px auto 0;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            animation: fadeIn 0.5s 0.1s ease both;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 22px 16px;
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:hover { border-color: var(--border-hover); transform: translateY(-3px); }

        .stat-num {
            font-size: 2rem;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            margin-bottom: 4px;
        }

        .stat-label { color: var(--text-muted); font-size: 0.8rem; font-weight: 700; }


        /* ============================================================
           Section Title
           ============================================================ */

        .section-title {
            max-width: 820px;
            margin: 36px auto 16px;
            padding: 0 20px;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }


        /* ============================================================
           🏅 Badges Grid
           ============================================================ */

        #badgesGrid {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
            gap: 14px;
            animation: fadeIn 0.5s 0.15s ease both;
        }

        .badge-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 14px;
            text-align: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        /* مكتسب */
        .badge-card.earned {
            border-color: rgba(139, 92, 246, 0.35);
            background: linear-gradient(145deg, rgba(139,92,246,0.09) 0%, rgba(59,130,246,0.05) 100%);
        }

        .badge-card.earned:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(139, 92, 246, 0.2);
        }

        /* مقفول */
        .badge-card.locked {
            opacity: 0.32;
            filter: grayscale(1);
            cursor: default;
        }

        /* هالة ضوئية للمكتسب */
        .badge-card.earned::before {
            content: '';
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 70%);
            pointer-events: none;
        }

        /* شارة "جديد!" */
        .badge-card.new-badge::after {
            content: '✨ جديد';
            position: absolute;
            top: 8px; left: 8px;
            background: var(--accent-gradient);
            color: white;
            font-size: 0.58rem;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
        }

        .badge-icon {
            font-size: 2.4rem;
            display: block;
            margin-bottom: 10px;
            line-height: 1;
        }

        .badge-name {
            font-size: 0.82rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 5px;
            display: block;
        }

        .badge-desc {
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* عداد البادجات */
        .badges-count {
            max-width: 820px;
            margin: 12px auto 0;
            padding: 0 20px;
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .badges-count span { color: var(--primary); font-weight: 800; }


        /* ============================================================
           Scripts List
           ============================================================ */

        #userScripts {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 20px 80px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .mini-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition);
            animation: fadeIn 0.4s ease both;
        }

        .mini-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.4);
        }

        .mini-card-info { flex: 1; min-width: 0; cursor: pointer; }

        .mini-card-info h3 {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-card-meta { display: flex; gap: 12px; flex-wrap: wrap; }
        .mini-card-meta span { font-size: 0.78rem; color: var(--text-muted); }

        .cat-badge {
            background: var(--primary-dim);
            color: #b48bf8;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .delete-btn {
            background: rgba(248,113,113,0.08);
            color: var(--danger);
            border: 1px solid rgba(248,113,113,0.2);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 0.8rem;
            margin: 0;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 14px rgba(248,113,113,0.4);
            filter: none;
            transform: none;
        }

        .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
        .empty-state p { font-size: 1rem; margin-bottom: 20px; }


        /* ============================================================
           Responsive
           ============================================================ */

        @media (max-width: 600px) {

            .profile-card { flex-direction: column; text-align: center; }
            .profile-actions { justify-content: center; }
            .stat-num { font-size: 1.5rem; }
            #badgesGrid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
            .mini-card { flex-wrap: wrap; }

        }

    </style>
</head>
<body>

    <header>
        <button onclick="location.href='scripts.html'">📜 السكربتات</button>
        <button class="nav-button" onclick="location.href='index.html'">رجوع للصفحة الرئيسية</button>
    </header>


    <!-- Profile Card -->
    <div class="profile-hero">
        <div class="profile-card">
            <div class="avatar" id="avatar">؟</div>
            <div class="profile-info">
                <h2 id="username">جارٍ التحميل...</h2>
                <div class="profile-email" id="userEmail"></div>
                <div class="join-date"     id="joinDate"></div>
            </div>
            <div class="profile-actions">
                <button onclick="location.href='avatar.html'">🎭 شخصيتي</button>
                <button id="logoutBtn">🚪 خروج</button>
            </div>
        </div>
    </div>


    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-num"   id="totalScripts">0</span>
            <span class="stat-label">سكربت</span>
        </div>
        <div class="stat-card">
            <span class="stat-num"   id="totalLikes">0</span>
            <span class="stat-label">إجمالي اللايكات</span>
        </div>
        <div class="stat-card">
            <span class="stat-num"   id="avgRating">—</span>
            <span class="stat-label">متوسط التقييم</span>
        </div>
    </div>


    <!-- Badges -->
    <div class="section-title">🏅 البادجات</div>
    <div class="badges-count">حصلت على <span id="earnedCount">0</span> من <span id="totalCount">0</span> بادج</div>
    <div id="badgesGrid"></div>


    <!-- Scripts -->
    <div class="section-title" style="margin-top:40px">📜 سكربتاتي</div>
    <div id="userScripts">
        <div class="empty-state"><p>جارٍ التحميل...</p></div>
    </div>


    <script type="module">
        import { initializeApp }  from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getDatabase, ref, get, set, remove } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
            authDomain: "ccraft-space-scripts.firebaseapp.com",
            databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
            projectId: "ccraft-space-scripts",
            storageBucket: "ccraft-space-scripts.firebasestorage.app",
            messagingSenderId: "816078027492",
            appId: "1:816078027492:web:6472cce474078fd4d90af1",
            measurementId: "G-MHDM7YYYBN"
        };

        const app  = initializeApp(firebaseConfig);
        const db   = getDatabase(app);
        const auth = getAuth(app);


        /* ============================================================
           تعريف البادجات
           ============================================================ */

        const ALL_BADGES = [
            { id: 'first_script',   icon: '🚀', name: 'الانطلاقة',    desc: 'نشر أول سكربت',           check: s => s.scripts >= 1  },
            { id: 'five_scripts',   icon: '📦', name: 'مجموعة',       desc: 'نشر 5 سكربتات',           check: s => s.scripts >= 5  },
            { id: 'ten_scripts',    icon: '💎', name: 'محترف',         desc: 'نشر 10 سكربتات',          check: s => s.scripts >= 10 },
            { id: 'first_like',     icon: '👍', name: 'محبوب',         desc: 'الحصول على أول لايك',      check: s => s.totalLikes >= 1  },
            { id: 'ten_likes',      icon: '🔥', name: 'مشهور',         desc: 'الحصول على 10 لايكات',     check: s => s.totalLikes >= 10 },
            { id: 'fifty_likes',    icon: '⭐', name: 'نجم',           desc: 'الحصول على 50 لايك',       check: s => s.totalLikes >= 50 },
            { id: 'hundred_likes',  icon: '👑', name: 'أسطورة',        desc: 'الحصول على 100 لايك',      check: s => s.totalLikes >= 100},
            { id: 'good_rating',    icon: '🏆', name: 'تقييم ممتاز',   desc: 'متوسط تقييم 4+ نجوم',     check: s => s.avgRating >= 4   },
            { id: 'all_categories', icon: '🌈', name: 'متنوع',         desc: 'نشر في 3 أقسام مختلفة',   check: s => s.categories >= 3  },
            { id: 'veteran',        icon: '🎖️', name: 'مخضرم',        desc: 'عضو منذ أكثر من 30 يوم',  check: s => s.daysOld >= 30    },
        ];


        /* ============================================================
           Auth
           ============================================================ */

        onAuthStateChanged(auth, user => {
            if (!user) { location.href = 'login.html'; return; }
            renderProfile(user);
            loadData(user);
        });

        function renderProfile(user) {
            const name = user.email.split('@')[0];
            document.getElementById('username').innerText  = name;
            document.getElementById('userEmail').innerText = user.email;
            document.getElementById('avatar').innerText   = name.charAt(0).toUpperCase();
            const created = new Date(parseInt(user.metadata.createdAt));
            document.getElementById('joinDate').innerText =
                `انضم في: ${created.toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' })}`;
        }


        /* ============================================================
           تحميل البيانات
           ============================================================ */

        async function loadData(user) {
            const username = user.email.split('@')[0];
            const snap = await get(ref(db, 'scripts'));

            let mine = [];

            if (snap.exists()) {
                const all = snap.val();
                mine = Object.entries(all).filter(([, s]) =>
                    s.author === username || s.authorEmail === user.email
                );
            }

            let totalLikes = 0, totalRating = 0, totalVotes = 0;
            const cats = new Set();

            mine.forEach(([, s]) => {
                totalLikes  += s.likes  || 0;
                totalRating += s.rating || 0;
                totalVotes  += s.votes  || 0;
                if (s.category) cats.add(s.category);
            });

            const avgRating = totalVotes > 0 ? totalRating / totalVotes : 0;
            const daysOld   = (Date.now() - parseInt(user.metadata.createdAt)) / (1000 * 60 * 60 * 24);

            document.getElementById('totalScripts').innerText = mine.length;
            document.getElementById('totalLikes').innerText   = totalLikes;
            document.getElementById('avgRating').innerText    = totalVotes > 0 ? avgRating.toFixed(1) : '—';

            const stats = { scripts: mine.length, totalLikes, avgRating, categories: cats.size, daysOld };

            await renderBadges(user, stats);
            renderScripts(user, mine);
        }


        /* ============================================================
           Badges
           ============================================================ */

        async function renderBadges(user, stats) {
            const grid = document.getElementById('badgesGrid');
            grid.innerHTML = '';

            const savedSnap = await get(ref(db, `users/${user.uid}/badges`));
            const saved = savedSnap.exists() ? savedSnap.val() : {};

            let earned = 0;

            for (const badge of ALL_BADGES) {
                const isEarned  = badge.check(stats);
                const wasStored = !!saved[badge.id];
                const isNew     = isEarned && !wasStored;

                if (isEarned) {
                    earned++;
                    if (!wasStored) {
                        await set(ref(db, `users/${user.uid}/badges/${badge.id}`), { earnedAt: Date.now() });
                    }
                }

                const card = document.createElement('div');
                card.className = `badge-card ${isEarned ? 'earned' : 'locked'} ${isNew ? 'new-badge' : ''}`;
                card.innerHTML = `
                    <span class="badge-icon">${badge.icon}</span>
                    <span class="badge-name">${badge.name}</span>
                    <span class="badge-desc">${badge.desc}</span>
                `;
                grid.appendChild(card);
            }

            document.getElementById('earnedCount').innerText = earned;
            document.getElementById('totalCount').innerText  = ALL_BADGES.length;
        }


        /* ============================================================
           Scripts
           ============================================================ */

        function renderScripts(user, mine) {
            const container = document.getElementById('userScripts');
            container.innerHTML = '';

            if (mine.length === 0) { showEmpty(container); return; }

            mine.sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

            mine.forEach(([id, s], i) => {
                const avg  = s.votes ? (s.rating / s.votes).toFixed(1) : '—';
                const card = document.createElement('div');
                card.className = 'mini-card';
                card.style.animationDelay = `${i * 0.06}s`;

                card.innerHTML = `
                    <div class="mini-card-info">
                        <h3>${s.title || 'بدون عنوان'}</h3>
                        <div class="mini-card-meta">
                            <span class="cat-badge">${s.category || 'عام'}</span>
                            <span>👍 ${s.likes || 0}</span>
                            <span>⭐ ${avg}</span>
                        </div>
                    </div>
                    <button class="delete-btn" data-id="${id}">🗑️ حذف</button>
                `;

                card.querySelector('.mini-card-info').onclick = () =>
                    location.href = `script.html?id=${id}`;

                card.querySelector('.delete-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (!confirm('هل تريد حذف هذا السكربت نهائياً؟')) return;
                    await remove(ref(db, `scripts/${id}`));
                    card.style.cssText += 'opacity:0;transform:scale(0.95);transition:0.3s';
                    setTimeout(() => { card.remove(); loadData(user); }, 300);
                });

                container.appendChild(card);
            });
        }

        function showEmpty(container) {
            container.innerHTML = `
                <div class="empty-state">
                    <p>ما نشرتش أي سكربت لحد دلوقتي 😅</p>
                    <button onclick="location.href='publish.html'"
                        style="background:var(--accent-gradient);color:white;border:none;border-radius:50px;
                               padding:13px 30px;font-family:Tajawal,sans-serif;font-weight:800;cursor:pointer;
                               box-shadow:0 8px 20px rgba(139,92,246,0.3)">
                        📤 انشر أول سكربت
                    </button>
                </div>`;
        }


        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            localStorage.removeItem('currentUser');
            location.href = 'index.html';
        });

    </script>

</body>
</html>
