<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<title>تسجيل الدخول أو إنشاء حساب</title>
<style>
    /* تحسين شكل زر جوجل */
    #googleLoginBtn {
        background-color: #fff;
        color: #757575;
        border: 1px solid #ddd;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-weight: bold;
        margin-top: 10px;
        width: 100%;
        transition: background-color 0.3s;
    }
    #googleLoginBtn:hover {
        background-color: #f8f9fa;
    }
    .divider {
        margin: 20px 0;
        text-align: center;
        position: relative;
    }
    .divider::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: #eee;
        z-index: 1;
    }
    .divider span {
        background: #fff;
        padding: 0 15px;
        position: relative;
        z-index: 2;
        color: #999;
        font-size: 14px;
    }
    #msg {
        margin-top: 15px;
        padding: 10px;
        border-radius: 4px;
        font-size: 14px;
        display: none;
    }
    .error-msg {
        background-color: #ffebee;
        color: #c62828;
        display: block !important;
    }
</style>
</head>
<body>

<div id="authContainer">
    <h2>تسجيل الدخول</h2>
    <h1>تسجيل الدخول إلى CCRAFT SPACE</h1>
    <p>هذه الصفحة خاصة بحسابات موقع CCRAFT SPACE فقط</p>
    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
    <input type="password" id="loginPass" placeholder="كلمة المرور">
    <button id="loginBtn">دخول</button>

    <div class="divider"><span>أو</span></div>
    
    <button id="googleLoginBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo" width="18">
        تسجيل الدخول عبر جوجل
    </button>

    <h2>أو إنشاء حساب جديد</h2>
    <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
    <input type="password" id="regPass" placeholder="كلمة المرور">
    <button id="regBtn">إنشاء حساب</button>

    <p id="msg"></p>
    <button id="privacy" class="nav-button" onclick="location.href='privacy.html'">سياسة الخصوصية</button>
    <button id="home" class="nav-button" onclick="location.href='index.html'">رجوع للصفحة الرئيسية</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { 
    getAuth, 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword, 
    GoogleAuthProvider, 
    signInWithPopup,
    signOut,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
import { getDatabase, ref, set, update } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
    authDomain: "ccraft-space-scripts.firebaseapp.com",
    databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
    projectId: "ccraft-space-scripts",
    storageBucket: "ccraft-space-scripts.firebasestorage.app",
    messagingSenderId: "816078027492",
    appId: "1:816078027492:web:6472cce474078fd4d90af1",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const googleProvider = new GoogleAuthProvider();

const loginEmail = document.getElementById("loginEmail");
const loginPass = document.getElementById("loginPass");
const loginBtn = document.getElementById("loginBtn");
const googleLoginBtn = document.getElementById("googleLoginBtn");
const regEmail = document.getElementById("regEmail");
const regPass = document.getElementById("regPass");
const regBtn = document.getElementById("regBtn");
const msg = document.getElementById("msg");
const authContainer = document.getElementById("authContainer");

function showMessage(text, isError = true) {
    msg.textContent = text;
    msg.className = isError ? "error-msg" : "";
    msg.style.display = "block";
}

// مراقبة حالة المصادقة
onAuthStateChanged(auth, (user) => {
    if (user) {
        localStorage.setItem("currentUser", user.uid);
        showLoggedInView(user);
    } else {
        localStorage.removeItem("currentUser");
    }
});

function showLoggedInView(user){
    authContainer.innerHTML = `
        <h2>مرحبا بك ${user.displayName || user.email}!</h2>
        <button id="logoutBtn">تسجيل خروج</button>
        <button onclick="location.href='index.html'">الصفحة الرئيسية</button>
    `;
    const logoutBtn = document.getElementById("logoutBtn");
    logoutBtn.addEventListener("click", async ()=>{
        try{
            await signOut(auth);
            window.location.reload();
        }catch(e){
            alert("حدث خطأ أثناء تسجيل الخروج");
        }
    });
}

// تسجيل الدخول بالبريد
loginBtn.addEventListener("click", async ()=>{
    const email = loginEmail.value.trim();
    const pass = loginPass.value.trim();
    if(!email||!pass){ showMessage("ادخل البريد وكلمة المرور"); return; }
    try{
        await signInWithEmailAndPassword(auth,email,pass);
    }catch(e){
        showMessage("خطأ في البريد أو كلمة المرور");
    }
});

// تسجيل الدخول عبر جوجل
googleLoginBtn.addEventListener("click", async () => {
    try {
        const result = await signInWithPopup(auth, googleProvider);
        const user = result.user;
        
        // تحديث بيانات المستخدم في قاعدة البيانات
        await update(ref(db, `users/${user.uid}`), {
            email: user.email,
            displayName: user.displayName,
            photoURL: user.photoURL,
            lastLogin: new Date().toISOString()
        });
    } catch (error) {
        console.error("Google Login Error:", error);
        if (error.code === 'auth/unauthorized-domain') {
            showMessage("خطأ: النطاق الحالي غير مصرح به في Firebase. يرجى إضافة النطاق إلى قائمة Authorized Domains في لوحة تحكم Firebase.");
        } else {
            showMessage("فشل تسجيل الدخول عبر جوجل: " + error.message);
        }
    }
});

// إنشاء حساب جديد
regBtn.addEventListener("click", async ()=>{
    const email = regEmail.value.trim();
    const pass = regPass.value.trim();
    if(!email||!pass){ showMessage("ادخل البريد وكلمة المرور"); return; }
    try{
        const userCred = await createUserWithEmailAndPassword(auth,email,pass);
        await set(ref(db, `users/${userCred.user.uid}`), { email });
    }catch(e){
        showMessage("حدث خطأ، حاول مرة أخرى");
    }
});
</script>
</body>
</html>
