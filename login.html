<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
    <link rel="stylesheet" href="styles.css">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, get, set, push } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
    authDomain: "ccraft-space-scripts.firebaseapp.com",
    databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
    projectId: "ccraft-space-scripts",
    storageBucket: "ccraft-space-scripts.firebasestorage.app",
    messagingSenderId: "816078027492",
    appId: "1:816078027492:web:6472cce474078fd4d90af1",
    measurementId: "G-MHDM7YYYBN"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// تسجيل الدخول
window.login = async function() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    if (!email || !password) return alert("ادخل البريد وكلمة المرور");

    const usersSnap = await get(ref(db, "users"));
    const users = usersSnap.val() || {};

    // البحث عن المستخدم
    const userId = Object.keys(users).find(id => users[id].email === email && users[id].password === password);
    if (userId) {
        localStorage.setItem("currentUser", userId); // حفظ الجلسة
        window.location.href = "index.html";
    } else {
        alert("بيانات غير صحيحة، حاول مرة أخرى");
    }
};

// إنشاء حساب جديد
window.register = async function() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    if (!email || !password) return alert("ادخل البريد وكلمة المرور");

    const usersSnap = await get(ref(db, "users"));
    const users = usersSnap.val() || {};

    // التحقق من أن الإيميل مش موجود مسبقاً
    const exists = Object.values(users).some(u => u.email === email);
    if (exists) return alert("هذا البريد مستخدم بالفعل");

    // حفظ المستخدم الجديد
    const newUserRef = push(ref(db, "users"));
    await set(newUserRef, { email, password });
    localStorage.setItem("currentUser", newUserRef.key); // حفظ الجلسة
    window.location.href = "index.html";
};
</script>
</head>
<body>
<h1>تسجيل الدخول أو إنشاء حساب</h1>
<input type="email" id="email" placeholder="البريد الإلكتروني"><br><br>
<input type="password" id="password" placeholder="كلمة المرور"><br><br>
<button onclick="login()">تسجيل الدخول</button>
<button onclick="register()">إنشاء حساب</button>
</body>
</html>
