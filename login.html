<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>تسجيل الدخول أو إنشاء حساب</h1>

<input type="email" id="email" placeholder="البريد الإلكتروني"><br><br>
<input type="password" id="password" placeholder="كلمة المرور"><br><br>

<button id="loginBtn">تسجيل الدخول</button>
<button id="registerBtn">إنشاء حساب</button>

<script type="module">
  // استيراد Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-analytics.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

  // إعدادات Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
    authDomain: "ccraft-space-scripts.firebaseapp.com",
    databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
    projectId: "ccraft-space-scripts",
    storageBucket: "ccraft-space-scripts.firebasestorage.app",
    messagingSenderId: "816078027492",
    appId: "1:816078027492:web:6472cce474078fd4d90af1",
    measurementId: "G-MHDM7YYYBN"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);

  // بريد الأدمن الحقيقي
  const ADMIN_EMAIL = "youradmin@gmail.com";

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");

  // تسجيل دخول
  document.getElementById("loginBtn").onclick = async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    try {
      await signInWithEmailAndPassword(auth, email, password);

      if(email === ADMIN_EMAIL){
        window.location.href = "admin.html"; // لوحة الأدمن
      } else {
        window.location.href = "index.html"; // صفحة المستخدم العادي
      }

    } catch {
      alert("خطأ في البريد الإلكتروني أو كلمة المرور");
    }
  };

  // إنشاء حساب
  document.getElementById("registerBtn").onclick = async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if(email === ADMIN_EMAIL){
      alert("غير مسموح إنشاء حساب بهذا البريد");
      return;
    }

    try {
      await createUserWithEmailAndPassword(auth, email, password);
      window.location.href = "index.html";
    } catch {
      alert("فشل إنشاء الحساب");
    }
  };
</script>

</body>
</html>
