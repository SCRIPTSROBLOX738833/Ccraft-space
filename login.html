<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول </title>
      <link rel="stylesheet" href="styles.css">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
  authDomain: "ccraft-space-scripts.firebaseapp.com",
  projectId: "ccraft-space-scripts",
  storageBucket: "ccraft-space-scripts.firebasestorage.app",
  messagingSenderId: "816078027492",
  appId: "1:816078027492:web:6472cce474078fd4d90af1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");

// دالة لتغيير الواجهة إذا المستخدم مسجل دخول
function showLogoutButton(user) {
  emailInput.style.display = "none";
  passwordInput.style.display = "none";
  loginBtn.style.display = "none";
  registerBtn.style.display = "none";

  let logoutBtn = document.getElementById("logoutBtn");
  if (!logoutBtn) {
    logoutBtn = document.createElement("button");
    logoutBtn.id = "logoutBtn";
    logoutBtn.innerText = "تسجيل خروج";
    logoutBtn.onclick = async () => {
      await signOut(auth);
      window.location.reload();
    };
    document.body.appendChild(logoutBtn);
  } else {
    logoutBtn.style.display = "block";
  }
}

// متابعة حالة تسجيل الدخول عند تحميل الصفحة
onAuthStateChanged(auth, (user) => {
  if (user) {
    // لو المستخدم موجود، نعرض زر تسجيل الخروج
    showLogoutButton(user);
  }
});

loginBtn.onclick = async () => {
  try {
    const userCredential = await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    localStorage.setItem("currentUser", userCredential.user.uid);
    window.location.href = "index.html"; // تحويل بعد تسجيل الدخول
  } catch(e) {
    alert("بيانات غير صحيحة أو المستخدم غير موجود");
  }
};

registerBtn.onclick = async () => {
  try {
    const userCredential = await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    localStorage.setItem("currentUser", userCredential.user.uid);
    window.location.href = "index.html"; // تحويل بعد إنشاء الحساب
  } catch(e) {
    alert("حدث خطأ أو البريد مستخدم بالفعل");
  }
};
</script>
</head>
<body>
<h1>تسجيل الدخول أو إنشاء حساب</h1>
<input type="email" id="email" placeholder="البريد الإلكتروني"><br><br>
<input type="password" id="password" placeholder="كلمة المرور"><br><br>
<button id="loginBtn">تسجيل الدخول</button>
<button id="registerBtn">إنشاء حساب</button>
</body>
</html>
