<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="styles.css">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
    authDomain: "ccraft-space-scripts.firebaseapp.com",
    projectId: "ccraft-space-scripts"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const adminEmail = "ضع_ايميل_الادمن_هنا";

window.login = async function() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        alert("ادخل البريد وكلمة المرور");
        return;
    }

    try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        if (user.email === adminEmail) {
            window.location.href = "admin.html";
        } else {
            window.location.href = "index.html";
        }

    } catch {
        alert("بيانات غير صحيحة");
    }
};

window.register = async function() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        alert("ادخل البريد وكلمة المرور");
        return;
    }

    try {
        await createUserWithEmailAndPassword(auth, email, password);
        window.location.href = "index.html";
    } catch {
        alert("فشل إنشاء الحساب");
    }
};

window.logout = async function() {
    await signOut(auth);
    location.reload();
};

onAuthStateChanged(auth, user => {
    if(user){
        console.log("مسجل دخول:", user.email);
    }
});
</script>
</head>

<body>

<h1>تسجيل الدخول أو إنشاء حساب</h1>
<p>هذه صفحة تسجيل دخول خاصة بموقع CCRAFT SPACE</p>

<input type="email" id="email" placeholder="البريد الإلكتروني"><br><br>
<input type="password" id="password" placeholder="كلمة المرور"><br><br>

<button onclick="login()">تسجيل الدخول</button>
<button onclick="register()">إنشاء حساب</button>

</body>
</html>
