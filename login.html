<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="styles.css">
<title>تسجيل الدخول أو إنشاء حساب</title>
</head>
<body>
<h2>تسجيل الدخول</h2>
<input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
<input type="password" id="loginPass" placeholder="كلمة المرور">
<button id="loginBtn">دخول</button>

<h2>أو إنشاء حساب جديد</h2>
<input type="email" id="regEmail" placeholder="البريد الإلكتروني">
<input type="password" id="regPass" placeholder="كلمة المرور">
<button id="regBtn">إنشاء حساب</button>

<p id="msg" style="color:red;"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
    authDomain: "ccraft-space-scripts.firebaseapp.com",
    databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
    projectId: "ccraft-space-scripts",
    storageBucket: "ccraft-space-scripts.firebasestorage.app",
    messagingSenderId: "816078027492",
    appId: "1:816078027492:web:6472cce474078fd4d90af1",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const loginEmail = document.getElementById("loginEmail");
const loginPass = document.getElementById("loginPass");
const loginBtn = document.getElementById("loginBtn");
const regEmail = document.getElementById("regEmail");
const regPass = document.getElementById("regPass");
const regBtn = document.getElementById("regBtn");
const msg = document.getElementById("msg");

loginBtn.addEventListener("click", async ()=>{
    const email = loginEmail.value.trim();
    const pass = loginPass.value.trim();
    if(!email||!pass){ msg.textContent="ادخل البريد وكلمة المرور"; return; }
    try{
        const userCred = await signInWithEmailAndPassword(auth,email,pass);
        localStorage.setItem("currentUser", userCred.user.uid);
        window.location.href="chat.html";
    }catch(e){
        msg.textContent = "خطأ في البريد أو كلمة المرور";
    }
});

regBtn.addEventListener("click", async ()=>{
    const email = regEmail.value.trim();
    const pass = regPass.value.trim();
    if(!email||!pass){ msg.textContent="ادخل البريد وكلمة المرور"; return; }
    try{
        const userCred = await createUserWithEmailAndPassword(auth,email,pass);
        localStorage.setItem("currentUser", userCred.user.uid);
        // أضف المستخدم للداتا بيس
        await set(ref(db, `users/${userCred.user.uid}`), { email });
        window.location.href="chat.html";
    }catch(e){
        msg.textContent = "حدث خطأ، حاول مرة أخرى";
    }
});
</script>
</body>
</html>
