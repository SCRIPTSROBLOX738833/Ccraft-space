<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
<title>تسجيل الدخول</title>
</head>
<body>
<h1>تسجيل الدخول</h1>
<input type="email" id="email" placeholder="البريد الإلكتروني"><br><br>
<input type="password" id="password" placeholder="كلمة المرور"><br><br>
<button id="loginBtn">دخول</button>
<p id="loginError" style="color:red;"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
  authDomain: "ccraft-space-scripts.firebaseapp.com",
  databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
  projectId: "ccraft-space-scripts",
  storageBucket: "ccraft-space-scripts.firebasestorage.app",
  messagingSenderId: "816078027492",
  appId: "1:816078027492:web:6472cce474078fd4d90af1",
  measurementId: "G-MHDM7YYYBN"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const loginBtn = document.getElementById("loginBtn");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginError = document.getElementById("loginError");

loginBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  if(!email || !password) return loginError.textContent = "ادخل البريد وكلمة المرور";

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;
    const idTokenResult = await user.getIdTokenResult();

    if(idTokenResult.claims.admin){
      window.location.href = "admin.html"; // لوحة الأدمن
    } else {
      window.location.href = "index.html"; // صفحة المستخدم العادي
    }
  } catch(err) {
    loginError.textContent = "خطأ في البريد أو كلمة المرور";
  }
});
</script>
</body>
</html>
