<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نتائج البحث</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <button onclick="location.href='scripts.html'">العودة للصفحة الرئيسية</button>
</header>

<main>
  <h1>نتائج البحث</h1>
  <div id="searchResults"></div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
    authDomain: "ccraft-space-scripts.firebaseapp.com",
    databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
    projectId: "ccraft-space-scripts",
    storageBucket: "ccraft-space-scripts.firebasestorage.app",
    messagingSenderId: "816078027492",
    appId: "1:816078027492:web:6472cce474078fd4d90af1",
    measurementId: "G-MHDM7YYYBN"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  function getSearchQuery() {
    const params = new URLSearchParams(window.location.search);
    return params.get('query') ? params.get('query').toLowerCase().trim() : '';
  }

  async function loadSearchResults() {
    const results = document.getElementById('searchResults');
    results.innerHTML = '';
    const snapshot = await get(ref(db, 'scripts'));
    if(snapshot.exists()) {
      const scripts = snapshot.val();
      const query = getSearchQuery();
      let anyMatch = false;

      Object.keys(scripts).forEach(id => {
        const s = scripts[id];
        const title = s.title.toLowerCase();
        const category = s.category.toLowerCase();
        if(title.includes(query) || category.includes(query)) {
          const div = document.createElement('div');
          div.className = 'script-card';
          div.innerHTML = `
            <h3>${s.title}</h3>
            <pre id="code-${id}">${s.code}</pre>
            <p>Category: ${s.category}</p>
            <button onclick="copyScript('${id}')">نسخ السكربت</button>
          `;
          results.appendChild(div);
          anyMatch = true;
        }
      });

      if(!anyMatch) {
        results.innerHTML = '<p style="color:red">لا توجد سكربتات مطابقة.</p>';
      }
    } else {
      results.innerHTML = '<p>لا توجد سكربتات حتى الآن.</p>';
    }
  }

  function copyScript(id) {
    const codeEl = document.getElementById(`code-${id}`);
    if(!codeEl) return alert("خطأ في السكربت");
    navigator.clipboard.writeText(codeEl.innerText)
      .then(() => alert("تم نسخ السكربت!"))
      .catch(() => alert("حدث خطأ أثناء النسخ"));
  }

  window.addEventListener('DOMContentLoaded', loadSearchResults);
  window.copyScript = copyScript;
</script>
</body>
</html>
