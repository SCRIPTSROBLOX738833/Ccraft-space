<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cCraft Space Help</title>
<link rel="stylesheet" href="styles.css">
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f9f9f9;
    margin: 0;
    padding: 0;
  }
  header {
    background: #4a90e2;
    color: white;
    padding: 15px;
    text-align: center;
  }
  main {
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  h1 {
    text-align: center;
    color: #333;
  }
  label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
  }
  input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }
  button {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    border: none;
    background: #4a90e2;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
  }
  button:hover {
    background: #357ab7;
  }
</style>
</head>
<body>
<header>
  <h2>cCraft Space Help</h2>
</header>
<main>
  <h1>الدعم الفني</h1>
  <p>لو عندك أي مشكلة أو استفسار، املأ النموذج ده وسنرد عليك على بريدك الإلكتروني.</p>
  <button id="home" class="nav-button" onclick="location.href='index.html'">رجوع للصفحة الرئيسية</button>

  <form id="supportForm">
    <label for="name">الاسم:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">البريد الإلكتروني:</label>
    <input type="email" id="email" name="email" required>

    <label for="message">الرسالة:</label>
    <textarea id="message" name="message" rows="6" required></textarea>

    <button type="submit">إرسال</button>
  </form>
  <p id="statusMsg" style="color: green; margin-top: 15px;"></p>
</main>

<script>
  const form = document.getElementById('supportForm');
  const statusMsg = document.getElementById('statusMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();

    if (!name || !email || !message) {
      alert('مطلوب ملء كل الحقول!');
      return;
    }

    // فتح البريد الإلكتروني لإرسال الرسالة
    const mailtoLink = `mailto:ccraftspacehelp@gmail.com?subject=Support Request from ${encodeURIComponent(name)}&body=${encodeURIComponent(message + "\n\nFrom: " + email)}`;
    window.location.href = mailtoLink;

    statusMsg.innerText = "تم فتح بريدك لإرسال الرسالة. تحقق من بريدك وأرسل الرسالة.";
    form.reset();
  });
</script>
</body>
  </html>
