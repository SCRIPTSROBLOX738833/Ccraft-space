<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCRAFT SPACE | ليدربورد السكربتات</title>
    <link rel="stylesheet" href="styles.css">
    <style>

        /* ============================================================
           ليدربورد — Styles خاصة
           ============================================================ */

        .lb-header {
            text-align: center;
            padding: 48px 20px 32px;
        }

        .lb-header h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .lb-header p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 0;
        }


        /* فلتر الترتيب */

        .lb-filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 24px auto 36px;
            max-width: 600px;
            padding: 0 20px;
        }

        .filter-btn {
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 10px 22px;
            font-size: 0.88rem;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin: 0;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary-dim);
            color: var(--primary);
            border-color: rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
            filter: none;
        }


        /* قائمة الليدربورد */

        #leaderboard {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 20px 80px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }


        /* كارد الليدربورد */

        .lb-card {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 20px 24px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease both;
        }

        .lb-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 14px 36px rgba(0,0,0,0.45);
        }

        /* خط جانبي عند الهوفر */
        .lb-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-gradient);
            opacity: 0;
            transition: 0.3s;
        }

        .lb-card:hover::after {
            opacity: 1;
        }


        /* المراكز الأولى مميزة */

        .lb-card.rank-1 { border-color: rgba(255, 215, 0, 0.3); }
        .lb-card.rank-2 { border-color: rgba(192, 192, 192, 0.25); }
        .lb-card.rank-3 { border-color: rgba(205, 127, 50, 0.25); }

        .lb-card.rank-1::after { background: linear-gradient(180deg, #ffd700, #ffaa00); }
        .lb-card.rank-2::after { background: linear-gradient(180deg, #c0c0c0, #a0a0a0); }
        .lb-card.rank-3::after { background: linear-gradient(180deg, #cd7f32, #a0522d); }


        /* رقم الترتيب */

        .lb-rank {
            font-size: 1.6rem;
            font-weight: 900;
            min-width: 48px;
            text-align: center;
            flex-shrink: 0;
        }

        .rank-1 .lb-rank { color: #ffd700; text-shadow: 0 0 16px rgba(255,215,0,0.5); }
        .rank-2 .lb-rank { color: #c0c0c0; }
        .rank-3 .lb-rank { color: #cd7f32; }
        .lb-card:not(.rank-1):not(.rank-2):not(.rank-3) .lb-rank {
            color: var(--text-muted);
            font-size: 1.2rem;
        }


        /* معلومات السكربت */

        .lb-info {
            flex: 1;
            min-width: 0;
        }

        .lb-info h3 {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lb-info .lb-meta {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .lb-meta span {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .lb-meta .category-badge {
            background: var(--primary-dim);
            color: #b48bf8;
            padding: 3px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.75rem;
        }


        /* الإحصائيات */

        .lb-stats {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }

        .stat-likes {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-rating {
            font-size: 0.8rem;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 4px;
        }


        /* Loading */

        .lb-loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .lb-loading span {
            display: inline-block;
            animation: pulse 1.2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        /* stagger animation للكاردز */
        .lb-card:nth-child(1)  { animation-delay: 0.05s; }
        .lb-card:nth-child(2)  { animation-delay: 0.10s; }
        .lb-card:nth-child(3)  { animation-delay: 0.15s; }
        .lb-card:nth-child(4)  { animation-delay: 0.20s; }
        .lb-card:nth-child(5)  { animation-delay: 0.25s; }
        .lb-card:nth-child(6)  { animation-delay: 0.30s; }
        .lb-card:nth-child(7)  { animation-delay: 0.35s; }
        .lb-card:nth-child(8)  { animation-delay: 0.40s; }
        .lb-card:nth-child(9)  { animation-delay: 0.45s; }
        .lb-card:nth-child(10) { animation-delay: 0.50s; }


        @media (max-width: 600px) {

            .lb-card {
                flex-wrap: wrap;
                gap: 12px;
                padding: 16px 18px;
            }

            .lb-stats {
                flex-direction: row;
                align-items: center;
                gap: 14px;
                width: 100%;
            }

        }

    </style>
</head>
<body>

    <header>
        <button onclick="location.href='scripts.html'">📜 السكربتات</button>
        <button id="home" class="nav-button" onclick="location.href='index.html'">رجوع للصفحة الرئيسية</button>
    </header>


    <div class="lb-header">
        <h1>🏆 ليدربورد السكربتات</h1>
        <p>أفضل السكربتات حسب تقييم المجتمع</p>
    </div>


    <div class="lb-filters">
        <button class="filter-btn active" data-sort="likes">👍 اللايكات</button>
        <button class="filter-btn" data-sort="rating">⭐ التقييم</button>
        <button class="filter-btn" data-sort="newest">🆕 الأحدث</button>
    </div>


    <div id="leaderboard">
        <div class="lb-loading"><span>جارٍ تحميل الليدربورد...</span></div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
            authDomain: "ccraft-space-scripts.firebaseapp.com",
            databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
            projectId: "ccraft-space-scripts",
            storageBucket: "ccraft-space-scripts.firebasestorage.app",
            messagingSenderId: "816078027492",
            appId: "1:816078027492:web:6472cce474078fd4d90af1",
            measurementId: "G-MHDM7YYYBN"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getDatabase(app);

        const rankEmojis = { 1: '🥇', 2: '🥈', 3: '🥉' };

        let allScripts = [];
        let currentSort = 'likes';

        async function loadLeaderboard() {
            const snap = await get(ref(db, 'scripts'));
            if (!snap.exists()) {
                document.getElementById('leaderboard').innerHTML =
                    '<div class="lb-loading"><span>لا توجد سكربتات بعد.</span></div>';
                return;
            }

            const data = snap.val();
            allScripts = Object.entries(data).map(([id, s]) => ({ id, ...s }));
            renderLeaderboard();
        }

        function renderLeaderboard() {
            const sorted = [...allScripts].sort((a, b) => {
                if (currentSort === 'likes')   return (b.likes || 0) - (a.likes || 0);
                if (currentSort === 'rating')  return getAvg(b) - getAvg(a);
                if (currentSort === 'newest')  return (b.timestamp || 0) - (a.timestamp || 0);
                return 0;
            });

            const lb = document.getElementById('leaderboard');
            lb.innerHTML = '';

            sorted.slice(0, 20).forEach((s, i) => {
                const rank    = i + 1;
                const avg     = getAvg(s);
                const rankCls = rank <= 3 ? `rank-${rank}` : '';
                const emoji   = rankEmojis[rank] || `#${rank}`;

                const card = document.createElement('div');
                card.className = `lb-card ${rankCls}`;
                card.onclick = () => location.href = `script.html?id=${s.id}`;

                card.innerHTML = `
                    <div class="lb-rank">${emoji}</div>

                    <div class="lb-info">
                        <h3>${s.title || 'بدون عنوان'}</h3>
                        <div class="lb-meta">
                            <span class="category-badge">${s.category || 'عام'}</span>
                            <span>✍️ ${s.author || 'مجهول'}</span>
                        </div>
                    </div>

                    <div class="lb-stats">
                        <div class="stat-likes">👍 ${s.likes || 0}</div>
                        <div class="stat-rating">⭐ ${avg > 0 ? avg.toFixed(1) : '—'}</div>
                    </div>
                `;

                lb.appendChild(card);
            });
        }

        function getAvg(s) {
            return s.votes ? s.rating / s.votes : 0;
        }

        // فلتر الترتيب
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSort = btn.dataset.sort;
                renderLeaderboard();
            });
        });

        loadLeaderboard();
    </script>

</body>
</html>
