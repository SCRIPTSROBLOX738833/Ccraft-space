<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCRAFT SPACE | NOVA AI</title>
<link rel="stylesheet" href="styles.css">
<style>

body { display:flex; flex-direction:column; min-height:100svh; overflow-x:hidden; }
header { flex-shrink:0; }

.nova-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px 20px;
    min-height: 0;
}

/* ---- Nova Header ---- */
.nova-header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 0 14px; flex-shrink: 0;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 14px;
}

.nova-avatar {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--accent-gradient);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    box-shadow: 0 0 20px rgba(139,92,246,0.5);
    flex-shrink: 0;
    animation: pulse-glow 3s ease infinite;
}

@keyframes pulse-glow { 0%,100%{box-shadow:0 0 16px rgba(139,92,246,0.4)} 50%{box-shadow:0 0 32px rgba(139,92,246,0.7)} }

.nova-info { flex: 1; }
.nova-info h2 {
    font-size: 1.1rem; font-weight: 900;
    background: var(--accent-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 2px;
}

.nova-status { display:flex; align-items:center; gap:6px; font-size:0.75rem; color:var(--success); font-weight:700; }
.nova-status::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--success); animation:blink 1.5s ease infinite; flex-shrink:0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.nova-actions { display:flex; gap:6px; }

.nav-action-btn {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border-color);
    border-radius: 10px; padding: 7px 12px;
    font-size: 0.72rem; font-weight: 800; color: var(--text-muted);
    cursor: pointer; font-family: 'Tajawal', sans-serif;
    margin: 0; transition: var(--transition);
}
.nav-action-btn:hover { border-color:var(--primary); color:var(--primary); transform:none; filter:none; }

/* ---- Quick Prompts ---- */
.quick-prompts {
    display: flex; gap: 7px; flex-wrap: wrap;
    margin-bottom: 12px; flex-shrink: 0;
}

.qp-btn {
    background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.2);
    border-radius: 50px; padding: 6px 14px;
    font-size: 0.75rem; font-weight: 800; color: var(--primary);
    cursor: pointer; font-family: 'Tajawal', sans-serif;
    margin: 0; transition: var(--transition); white-space: nowrap;
}
.qp-btn:hover { background:var(--primary-dim); transform:none; filter:none; }

/* ---- Chatbox ---- */
#chatbox {
    flex: 1; min-height: 300px; max-height: calc(100svh - 340px);
    background: var(--bg-card); border: 1px solid var(--border-color);
    border-radius: 20px; padding: 16px;
    overflow-y: auto; display: flex; flex-direction: column;
    gap: 10px; margin-bottom: 12px; scroll-behavior: smooth;
}

.message {
    display: flex; gap: 8px; align-items: flex-end;
    animation: msgIn 0.3s ease both; max-width: 88%;
}

@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.message.user  { align-self:flex-end;  flex-direction:row-reverse; }
.message.nova  { align-self:flex-start; }

.msg-icon {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; flex-shrink: 0;
}

.message.user .msg-icon { background:var(--accent-gradient); color:white; font-weight:900; }
.message.nova .msg-icon { background:rgba(139,92,246,0.15); border:1px solid rgba(139,92,246,0.3); }

.msg-bubble {
    padding: 11px 15px; border-radius: 18px;
    font-size: 0.92rem; line-height: 1.65;
    word-break: break-word; max-width: 100%;
}

.message.user .msg-bubble {
    background: var(--accent-gradient); color: white;
    border-bottom-left-radius: 5px;
    box-shadow: 0 4px 14px rgba(139,92,246,0.3);
}

.message.nova .msg-bubble {
    background: var(--bg-surface); color: var(--text-main);
    border: 1px solid var(--border-color);
    border-bottom-right-radius: 5px;
    direction: rtl; text-align: right;
}

/* Typing */
.dots { display:flex; gap:5px; align-items:center; padding:2px 0; }
.dots span { width:7px; height:7px; border-radius:50%; background:var(--primary); animation:db 1.2s ease infinite; }
.dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
@keyframes db { 0%,60%,100%{transform:translateY(0);opacity:.5} 30%{transform:translateY(-6px);opacity:1} }

/* Welcome */
.welcome-msg { text-align:center; padding:20px 12px; color:var(--text-muted); }
.welcome-msg .w-icon { font-size:2.2rem; margin-bottom:8px; display:block; }
.welcome-msg p { font-size:0.88rem; line-height:1.7; }

/* ---- World/Game Modal ---- */
.world-modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(12px);
    z-index: 500;
    flex-direction: column;
}

.world-modal.open { display: flex; }

.world-toolbar {
    display: flex; align-items: center; gap: 12px;
    background: rgba(10,10,20,0.95); border-bottom: 1px solid var(--border-color);
    padding: 12px 20px; flex-shrink: 0;
}

.world-title { font-size: 0.9rem; font-weight: 800; color: var(--text-main); flex: 1; }
.world-close {
    background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25);
    border-radius: 10px; padding: 7px 14px;
    font-size: 0.8rem; font-weight: 800; color: var(--danger);
    cursor: pointer; font-family: 'Tajawal', sans-serif; margin: 0;
}
.world-close:hover { background:var(--danger); color:white; transform:none; filter:none; }

#worldFrame {
    flex: 1; border: none; background: white;
}

/* ---- Toast ---- */
.nova-toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--bg-card); border: 1px solid var(--primary);
    border-radius: 50px; padding: 10px 22px;
    font-size: 0.85rem; font-weight: 800; color: var(--text-main);
    z-index: 400; transition: transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    pointer-events: none; white-space: nowrap;
}

.nova-toast.show { transform: translateX(-50%) translateY(0); }

/* ---- Input ---- */
.input-area { display:flex; gap:8px; flex-shrink:0; }

#userInput {
    flex: 1;
    background: var(--bg-surface); border: 1px solid var(--border-color);
    border-radius: var(--radius-btn); padding: 14px 18px;
    color: var(--text-main); font-family: 'Tajawal', sans-serif;
    font-size: 0.95rem; outline: none; transition: var(--transition);
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.25);
    margin: 0; direction: rtl;
}

#userInput::placeholder { color:var(--text-muted); opacity:0.7; }
#userInput:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(139,92,246,0.15),inset 0 2px 6px rgba(0,0,0,0.3); }

#sendBtn {
    background: var(--accent-gradient); color: white; border: none;
    border-radius: var(--radius-btn); padding: 14px 22px;
    font-size: 0.95rem; cursor: pointer; font-family: 'Tajawal', sans-serif;
    font-weight: 800; box-shadow: 0 6px 18px rgba(139,92,246,0.35);
    transition: var(--transition); display:flex; align-items:center; gap:7px;
    white-space: nowrap; margin: 0; flex-shrink: 0;
}

#sendBtn:hover { transform:translateY(-2px); box-shadow:0 10px 24px rgba(139,92,246,0.5); filter:brightness(1.1); }
#sendBtn:active { transform:scale(0.96); }
#sendBtn:disabled { opacity:0.45; cursor:not-allowed; transform:none; filter:none; }

/* DOM-modified indicator */
.page-modified-badge {
    display: none;
    background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3);
    border-radius: 50px; padding: 4px 12px;
    font-size: 0.7rem; font-weight: 800; color: var(--success);
}

.page-modified-badge.show { display: inline-flex; align-items: center; gap: 5px; }

/* Responsive */
@media (max-width:580px) {
    #sendBtn span { display:none; }
    #sendBtn { padding:14px 16px; }
    .message { max-width:94%; }
    .quick-prompts { display:none; }
}

</style>
</head>
<body>

<header>
    <button class="nav-button" onclick="location.href='index.html'">رجوع للصفحة الرئيسية</button>
</header>

<div class="nova-wrapper">

    <div class="nova-header">
        <div class="nova-avatar">🤖</div>
        <div class="nova-info">
            <h2>NOVA AI</h2>
            <div class="nova-status" id="novaStatus">متصل — واعٍ بالسياق</div>
        </div>
        <div class="nova-actions">
            <span class="page-modified-badge" id="modBadge">🎨 تم تعديل الصفحة</span>
            <button class="nav-action-btn" onclick="clearMemory()" title="مسح الذاكرة">🗑️ مسح</button>
        </div>
    </div>

    <!-- اقتراحات سريعة -->
    <div class="quick-prompts" id="quickPrompts">
        <button class="qp-btn" onclick="quickSend('اصنع لي لعبة تجنب العقبات')">🎮 لعبة تجنب عقبات</button>
        <button class="qp-btn" onclick="quickSend('اصنع عالم فضائي تفاعلي')">🌌 عالم فضائي</button>
        <button class="qp-btn" onclick="quickSend('غيّر خلفية الصفحة لأزرق داكن')">🎨 غيّر الخلفية</button>
        <button class="qp-btn" onclick="quickSend('اصنع لعبة Snake بالعربي')">🐍 لعبة Snake</button>
        <button class="qp-btn" onclick="quickSend('ابعت رسالة تنبيه جميلة')">💬 رسالة تنبيه</button>
    </div>

    <!-- Chatbox -->
    <div id="chatbox">
        <div class="welcome-msg">
            <span class="w-icon">🤖</span>
            <p>
                أنا <strong>Nova</strong> — ذكاء CCRAFT SPACE.<br>
                أتذكر المحادثة كلها، أقدر أتحكم في الصفحة،<br>
                وأصنع لك ألعاب وعوالم كاملة! ✨
            </p>
        </div>
    </div>

    <!-- Input -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب لـ Nova...">
        <button id="sendBtn"><span>إرسال</span> ➤</button>
    </div>

</div>

<!-- World Modal -->
<div class="world-modal" id="worldModal">
    <div class="world-toolbar">
        <span>🌍</span>
        <span class="world-title" id="worldTitle">عالم Nova</span>
        <button class="world-close" onclick="closeWorld()">✕ إغلاق</button>
    </div>
    <iframe id="worldFrame" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<!-- Toast -->
<div class="nova-toast" id="novaToast"></div>


<script>
const NOVA_URL   = "https://anas9qos9.pythonanywhere.com";
const chatbox    = document.getElementById('chatbox');
const userInput  = document.getElementById('userInput');
const sendBtn    = document.getElementById('sendBtn');

// User ID من localStorage
let userId = localStorage.getItem('novaUserId');
if (!userId) {
    userId = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
    localStorage.setItem('novaUserId', userId);
}

const userIcon = (localStorage.getItem('currentUser') || '').charAt(0).toUpperCase() || 'أ';


/* ============================================================
   Messages
   ============================================================ */

function addMsg(text, sender) {
    // أخفي الترحيب
    chatbox.querySelector('.welcome-msg')?.remove();

    const wrap   = document.createElement('div');
    wrap.className = `message ${sender}`;

    const icon   = document.createElement('div');
    icon.className = 'msg-icon';
    icon.innerText = sender === 'user' ? userIcon : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    // دعم markdown بسيط للـ Nova
    if (sender === 'nova') {
        bubble.innerHTML = parseMarkdown(text);
    } else {
        bubble.innerText = text;
    }

    wrap.appendChild(icon);
    wrap.appendChild(bubble);
    chatbox.appendChild(wrap);
    chatbox.scrollTop = chatbox.scrollHeight;
    return wrap;
}

function parseMarkdown(text) {
    return text
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,     '<em>$1</em>')
        .replace(/`(.+?)`/g,       '<code style="background:rgba(139,92,246,0.15);padding:2px 6px;border-radius:5px;font-family:monospace;font-size:0.88em">$1</code>')
        .replace(/\n/g,            '<br>');
}

function showTyping() {
    chatbox.querySelector('.welcome-msg')?.remove();
    const wrap   = document.createElement('div');
    wrap.className = 'message nova'; wrap.id = 'typing';
    const icon   = document.createElement('div');
    icon.className = 'msg-icon'; icon.innerText = '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    wrap.appendChild(icon); wrap.appendChild(bubble);
    chatbox.appendChild(wrap);
    chatbox.scrollTop = chatbox.scrollHeight;
}

function removeTyping() { document.getElementById('typing')?.remove(); }


/* ============================================================
   DOM Control — تنفيذ أوامر Nova على الصفحة
   ============================================================ */

function executeDomCommand(cmd) {
    try {
        // تغيير خلفية: DOM:bg:#color
        if (cmd.startsWith('bg:')) {
            const color = cmd.slice(3).trim();
            document.body.style.background = color;
            showToast(`🎨 تم تغيير الخلفية`);
            showModBadge();
            return;
        }

        // إضافة عنصر: DOM:add:<html>
        if (cmd.startsWith('add:')) {
            const html = cmd.slice(4).trim();
            const div  = document.createElement('div');
            div.innerHTML = html;
            div.style.cssText = 'position:fixed;top:80px;right:20px;z-index:300;animation:fadeIn 0.5s ease both';
            document.body.appendChild(div);
            showToast('✅ تم إضافة العنصر');
            showModBadge();
            return;
        }

        // تشغيل JS: DOM:js:code
        if (cmd.startsWith('js:')) {
            const code = cmd.slice(3).trim();
            // تنفيذ آمن — فقط تغييرات CSS وDOM
            const safe_code = code
                .replace(/fetch\(/g,      '')
                .replace(/XMLHttpRequest/g,'')
                .replace(/location\.href/g,'')
                .replace(/window\.open/g,  '');
            eval(safe_code);
            showToast('⚡ تم تنفيذ الأمر');
            showModBadge();
            return;
        }

        // تغيير نص: DOM:text:#id:النص
        if (cmd.startsWith('text:')) {
            const parts = cmd.slice(5).split(':');
            const el    = document.querySelector(parts[0]);
            if (el) {
                el.innerText = parts.slice(1).join(':');
                showToast('✏️ تم تغيير النص');
                showModBadge();
            }
            return;
        }

        // إخفاء عنصر: DOM:hide:#id
        if (cmd.startsWith('hide:')) {
            const el = document.querySelector(cmd.slice(5));
            if (el) { el.style.display = 'none'; showToast('👁️ تم إخفاء العنصر'); showModBadge(); }
            return;
        }

        // toast من Nova: DOM:toast:نص
        if (cmd.startsWith('toast:')) {
            showToast(cmd.slice(6));
            return;
        }

    } catch(e) {
        console.error('DOM command error:', e);
    }
}


/* ============================================================
   World/Game
   ============================================================ */

function openWorld(worldData) {
    const modal = document.getElementById('worldModal');
    const frame = document.getElementById('worldFrame');
    const title = document.getElementById('worldTitle');

    title.innerText = worldData.title || 'عالم Nova';
    frame.srcdoc   = worldData.html   || '<p>فارغ</p>';
    modal.classList.add('open');
}

function closeWorld() {
    document.getElementById('worldModal').classList.remove('open');
    document.getElementById('worldFrame').srcdoc = '';
}


/* ============================================================
   Toast & Badges
   ============================================================ */

function showToast(msg) {
    const t = document.getElementById('novaToast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function showModBadge() {
    document.getElementById('modBadge').classList.add('show');
}


/* ============================================================
   Send Message
   ============================================================ */

async function sendMessage() {
    const msg = userInput.value.trim();
    if (!msg) return;

    // سياق الصفحة للـ Nova
    const pageCtx = `الصفحة: nova.html | عنوان الصفحة: ${document.title}`;

    addMsg(msg, 'user');
    userInput.value = '';
    sendBtn.disabled = true;
    showTyping();

    try {
        const res = await fetch(`${NOVA_URL}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message:      msg,
                user_id:      userId,
                page_context: pageCtx
            })
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        removeTyping();

        // رد نصي
        if (data.reply) addMsg(data.reply, 'nova');

        // أمر DOM
        if (data.type === 'dom' && data.dom_command) {
            executeDomCommand(data.dom_command);
        }

        // عالم/لعبة
        if (data.type === 'world' && data.world) {
            setTimeout(() => {
                const btn = document.createElement('button');
                btn.style.cssText = `
                    background:var(--accent-gradient);color:white;border:none;
                    border-radius:50px;padding:9px 20px;font-size:0.82rem;font-weight:800;
                    cursor:pointer;font-family:Tajawal,sans-serif;margin-top:8px;
                    box-shadow:0 4px 14px rgba(139,92,246,0.3);
                `;
                btn.innerText = `🌍 افتح ${data.world.title || 'العالم'}`;
                btn.onclick = () => openWorld(data.world);

                const lastMsg = chatbox.querySelector('.message.nova:last-child .msg-bubble');
                if (lastMsg) lastMsg.appendChild(document.createElement('br')), lastMsg.appendChild(btn);
            }, 100);
        }

    } catch(e) {
        removeTyping();
        addMsg(`عذراً، حدث خطأ 😢 — ${e.message}`, 'nova');
    } finally {
        sendBtn.disabled = false;
        userInput.focus();
    }
}


/* ============================================================
   Quick Prompts
   ============================================================ */

function quickSend(text) {
    userInput.value = text;
    sendMessage();
}


/* ============================================================
   Clear Memory
   ============================================================ */

async function clearMemory() {
    if (!confirm('مسح ذاكرة المحادثة؟')) return;
    try {
        await fetch(`${NOVA_URL}/clear/${userId}`, { method: 'DELETE' });
    } catch {}
    chatbox.innerHTML = `
        <div class="welcome-msg">
            <span class="w-icon">🤖</span>
            <p>تم مسح الذاكرة — أنا Nova، جاهز للمحادثة من جديد! ✨</p>
        </div>`;
    document.getElementById('modBadge').classList.remove('show');
    showToast('🗑️ تم مسح الذاكرة');
}


/* ============================================================
   Events
   ============================================================ */

sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

// اختبار الاتصال عند التحميل
(async () => {
    try {
        const res = await fetch(`${NOVA_URL}/status`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        document.getElementById('novaStatus').innerText =
            `متصل — موديل: ${data.model?.split('/').pop() || 'Gemini'}`;
    } catch {
        document.getElementById('novaStatus').innerText = '⚠️ تحقق من الاتصال';
        document.getElementById('novaStatus').style.color = 'var(--danger)';
    }
})();
</script>
</body>
</html>
