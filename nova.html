<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCRAFT SPACE | NOVA AI</title>
<link rel="stylesheet" href="styles.css">
<style>

    /* ============================================================
       Nova AI — Page Layout
       ============================================================ */

    body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    header {
        flex-shrink: 0;
    }

    .nova-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 740px;
        width: 100%;
        margin: 0 auto;
        padding: 0 16px 20px;
        min-height: 0;
    }


    /* ============================================================
       Nova Header
       ============================================================ */

    .nova-header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 18px 0 16px;
        flex-shrink: 0;
    }

    .nova-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--accent-gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        flex-shrink: 0;
        animation: pulse-glow 3s ease infinite;
    }

    @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 16px rgba(139,92,246,0.4); }
        50%       { box-shadow: 0 0 32px rgba(139,92,246,0.7); }
    }

    .nova-info h2 {
        font-size: 1.2rem;
        font-weight: 900;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 2px;
    }

    .nova-status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78rem;
        color: var(--success);
        font-weight: 700;
    }

    .nova-status::before {
        content: '';
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--success);
        animation: blink 1.5s ease infinite;
        flex-shrink: 0;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
    }


    /* ============================================================
       Chatbox
       ============================================================ */

    #chatbox {
        flex: 1;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 20px 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
        margin-bottom: 14px;
    }

    /* رسالة */
    .message {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        animation: msgIn 0.3s ease both;
        max-width: 85%;
    }

    @keyframes msgIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* رسالة اليوزر — يمين */
    .message.user {
        align-self: flex-end;
        flex-direction: row-reverse;
    }

    /* رسالة Nova — يسار */
    .message.nova {
        align-self: flex-start;
    }

    .msg-icon {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        flex-shrink: 0;
    }

    .message.user .msg-icon {
        background: var(--accent-gradient);
        color: white;
        font-weight: 900;
    }

    .message.nova .msg-icon {
        background: rgba(139,92,246,0.15);
        border: 1px solid rgba(139,92,246,0.3);
    }

    .msg-bubble {
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 0.95rem;
        line-height: 1.6;
        word-break: break-word;
    }

    .message.user .msg-bubble {
        background: var(--accent-gradient);
        color: white;
        border-bottom-left-radius: 6px;
        box-shadow: 0 4px 14px rgba(139,92,246,0.3);
    }

    .message.nova .msg-bubble {
        background: var(--bg-surface);
        color: var(--text-main);
        border: 1px solid var(--border-color);
        border-bottom-right-radius: 6px;
        direction: rtl;
        text-align: right;
    }

    /* مؤشر الكتابة */
    .typing-indicator .msg-bubble {
        padding: 14px 18px;
    }

    .dots {
        display: flex;
        gap: 5px;
        align-items: center;
    }

    .dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--primary);
        animation: dot-bounce 1.2s ease infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
        30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* رسالة ترحيب */
    .welcome-msg {
        text-align: center;
        padding: 24px 12px;
        color: var(--text-muted);
    }

    .welcome-msg .w-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
    .welcome-msg p { font-size: 0.9rem; line-height: 1.7; }


    /* ============================================================
       Input Area
       ============================================================ */

    .input-area {
        display: flex;
        gap: 10px;
        flex-shrink: 0;
    }

    #userInput {
        flex: 1;
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-btn);
        padding: 15px 22px;
        color: var(--text-main);
        font-family: 'Tajawal', sans-serif;
        font-size: 1rem;
        outline: none;
        transition: var(--transition);
        box-shadow: inset 0 2px 6px rgba(0,0,0,0.25);
        margin: 0;
        direction: rtl;
    }

    #userInput::placeholder {
        color: var(--text-muted);
        opacity: 0.7;
    }

    #userInput:focus {
        border-color: var(--primary);
        box-shadow:
            0 0 0 3px rgba(139,92,246,0.15),
            inset 0 2px 6px rgba(0,0,0,0.3);
    }

    #sendBtn {
        background: var(--accent-gradient);
        color: white;
        border: none;
        border-radius: var(--radius-btn);
        padding: 15px 26px;
        font-size: 1rem;
        cursor: pointer;
        font-family: 'Tajawal', sans-serif;
        font-weight: 800;
        box-shadow: 0 6px 18px rgba(139,92,246,0.35);
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
        margin: 0;
    }

    #sendBtn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 24px rgba(139,92,246,0.5);
        filter: brightness(1.1);
    }

    #sendBtn:active { transform: scale(0.96); }

    #sendBtn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
        filter: none;
    }


    /* ============================================================
       Responsive
       ============================================================ */

    @media (max-width: 600px) {

        .nova-wrapper { padding: 0 10px 14px; }
        #sendBtn span { display: none; }
        #sendBtn { padding: 15px 18px; }
        .message { max-width: 92%; }

    }

</style>
</head>
<body>

    <button class="nav-button" onclick="location.href='index.html'">رجوع للصفحة الرئيسية</button>
    <div class="nova-wrapper">

        <!-- Nova Header -->
        <div class="nova-header">
            <div class="nova-avatar">🤖</div>
            <div class="nova-info">
                <h2>NOVA AI</h2>
                <div class="nova-status">متصل الآن</div>
            </div>
        </div>

        <!-- Chatbox -->
        <div id="chatbox">
            <div class="welcome-msg">
                <span class="w-icon">🤖</span>
                <p>مرحباً! أنا <strong>Nova</strong>، مساعدك الذكي في CCRAFT SPACE.<br>اسألني أي شيء وأنا هنا لمساعدتك! ✨</p>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب رسالتك لـ Nova...">
            <button id="sendBtn">
                <span>إرسال</span> ➤
            </button>
        </div>

    </div>


<script>
const chatbox   = document.getElementById("chatbox");
const userInput = document.getElementById("userInput");
const sendBtn   = document.getElementById("sendBtn");

// أول حرف من اسم اليوزر للأيقونة
const storedUser = localStorage.getItem("currentUser");
const userIcon   = storedUser ? storedUser.charAt(0).toUpperCase() : "أ";

function addMessage(text, sender) {
    const wrap = document.createElement("div");
    wrap.className = `message ${sender}`;

    const icon   = document.createElement("div");
    icon.className = "msg-icon";
    icon.innerText = sender === "user" ? userIcon : "🤖";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.innerText = text;

    wrap.appendChild(icon);
    wrap.appendChild(bubble);
    chatbox.appendChild(wrap);
    chatbox.scrollTop = chatbox.scrollHeight;
    return wrap;
}

function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "message nova typing-indicator";
    wrap.id = "typing";

    const icon = document.createElement("div");
    icon.className = "msg-icon";
    icon.innerText = "🤖";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

    wrap.appendChild(icon);
    wrap.appendChild(bubble);
    chatbox.appendChild(wrap);
    chatbox.scrollTop = chatbox.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;

    // أخفي رسالة الترحيب
    const welcome = chatbox.querySelector(".welcome-msg");
    if (welcome) welcome.remove();

    addMessage(message, "user");
    userInput.value = "";
    sendBtn.disabled = true;
    showTyping();

    try {
        const res = await fetch("https://anas9qos9.pythonanywhere.com/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        });
        if (!res.ok) throw new Error("server error");
        const data = await res.json();
        removeTyping();
        addMessage(data.reply, "nova");
    } catch {
        removeTyping();
        addMessage("عذراً، حدث خطأ في الاتصال بـ Nova 😢 حاول مرة أخرى.", "nova");
    } finally {
        sendBtn.disabled = false;
        userInput.focus();
    }
}

sendBtn.addEventListener("click", sendMessage);
userInput.addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
