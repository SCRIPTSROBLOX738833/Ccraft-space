<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Chatbot 🤖</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #1e1e2f;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }
    h2 {
        margin-bottom: 20px;
    }
    #chatbox {
        width: 100%;
        max-width: 600px;
        height: 400px;
        background: #2c2c3e;
        border-radius: 10px;
        padding: 10px;
        overflow-y: auto;
        margin-bottom: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    .message {
        margin: 8px 0;
        padding: 8px 12px;
        border-radius: 10px;
        max-width: 80%;
        word-wrap: break-word;
    }
    .user-msg {
        background: #4e8cff;
        align-self: flex-end;
        text-align: right;
    }
    .nova-msg {
        background: #3a3a5c;
        align-self: flex-start;
        text-align: left;
    }
    #inputArea {
        display: flex;
        width: 100%;
        max-width: 600px;
    }
    #userInput {
        flex: 1;
        padding: 10px;
        border-radius: 10px 0 0 10px;
        border: none;
        outline: none;
        font-size: 16px;
    }
    #sendBtn {
        padding: 10px 20px;
        border-radius: 0 10px 10px 0;
        border: none;
        background: #4e8cff;
        color: #fff;
        cursor: pointer;
        font-size: 16px;
        transition: 0.2s;
    }
    #sendBtn:hover {
        background: #3a6edb;
    }
</style>
</head>
<body>

<h2>Nova Chatbot 🤖</h2>
<div id="chatbox"></div>

<div id="inputArea">
    <input type="text" id="userInput" placeholder="اكتب رسالتك...">
    <button id="sendBtn">إرسال</button>
</div>

<script>
const chatbox = document.getElementById("chatbox");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

// إضافة رسالة للشات
function addMessage(msg, sender) {
    const div = document.createElement("div");
    div.classList.add("message");
    div.classList.add(sender === "user" ? "user-msg" : "nova-msg");
    div.textContent = msg;
    chatbox.appendChild(div);
    chatbox.scrollTop = chatbox.scrollHeight;
}

// إرسال الرسالة للـ API
async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;
    addMessage(message, "user");
    userInput.value = "";

    try {
        const res = await fetch("https://anas9qos9.pythonanywhere.com/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        });
        if (!res.ok) throw new Error("Network response was not ok");
        const data = await res.json();
        addMessage(data.reply, "nova");
    } catch (err) {
        console.error(err);
        addMessage("Nova: خطأ في الاتصال بالخادم 😢", "nova");
    }
}

// إرسال عند الضغط على زر أو Enter
sendBtn.addEventListener("click", sendMessage);
userInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
