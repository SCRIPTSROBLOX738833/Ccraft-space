<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- تسجيل دخول الادمن -->
<div id="loginDiv">
  <h2>تسجيل دخول الأدمن</h2>
  <input type="email" id="email" placeholder="البريد الإلكتروني"><br><br>
  <input type="password" id="password" placeholder="كلمة المرور"><br><br>
  <button id="loginBtn">دخول</button>
  <button id="logoutBtn" style="display:none;">تسجيل خروج</button>
  <p id="loginError" style="color:red;"></p>
</div>

<!-- لوحة الإدارة -->
<div id="adminPanel" style="display:none;">
  <h1>لوحة الإدارة</h1>

  <h3>نشر سكربت جديد</h3>
  <input type="text" id="newTitle" placeholder="عنوان السكربت">
  <textarea id="newCode" placeholder="كود السكربت" rows="4"></textarea>
  <select id="newCategory">
    <option value="">اختر القسم</option>
    <option value="game">Game Scripts</option>
    <option value="admin">Admin Scripts</option>
    <option value="سكربت من الادارة">سكربت من الإدارة</option>
  </select>
  <button id="addScriptBtn">نشر</button>

  <hr>

  <h3>جميع السكربتات</h3>
  <ul id="scriptsList"></ul>

  <hr>

  <h3>شات المستخدمين</h3>
  <div id="chatContainer" style="max-height:300px; overflow:auto; background:#161b22; padding:1rem; border-radius:10px;"></div>

  <button id="adminLogoutBtn" style="margin-top:1rem;">تسجيل خروج</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, get, push, set, remove, update, onChildAdded } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

// --- إعداد Firebase ---
const firebaseConfig = {
  apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
  authDomain: "ccraft-space-scripts.firebaseapp.com",
  databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
  projectId: "ccraft-space-scripts",
  storageBucket: "ccraft-space-scripts.firebasestorage.app",
  messagingSenderId: "816078027492",
  appId: "1:816078027492:web:6472cce474078fd4d90af1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// --- عناصر HTML ---
const loginDiv = document.getElementById("loginDiv");
const adminPanel = document.getElementById("adminPanel");
const loginError = document.getElementById("loginError");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const scriptsList = document.getElementById("scriptsList");
const chatContainer = document.getElementById("chatContainer");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const adminLogoutBtn = document.getElementById("adminLogoutBtn");

// --- تسجيل خروج ---
logoutBtn.onclick = async ()=>{
  await signOut(auth);
  window.location.reload();
};
adminLogoutBtn.onclick = async ()=>{
  await signOut(auth);
  window.location.reload();
};

// --- تسجيل دخول الأدمن مع التحقق من قاعدة admins ---
loginBtn.onclick = async ()=>{
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  if(!email || !password){ loginError.textContent="ادخل البريد وكلمة المرور"; return; }

  try{
    const userCredential = await signInWithEmailAndPassword(auth,email,password);
    const uid = userCredential.user.uid;

    const adminSnap = await get(ref(db, `admins/${uid}`));
    const isAdmin = adminSnap.exists() && adminSnap.val() === true;

    if(isAdmin){
      loginDiv.style.display="none";
      adminPanel.style.display="block";
      logoutBtn.style.display = "block";
      loadScripts();
      loadChat();
    } else {
      loginError.textContent="أنت لا تملك صلاحيات الأدمن";
      await signOut(auth);
    }
  }catch(err){
    loginError.textContent="خطأ في البريد الإلكتروني أو كلمة المرور";
  }
};

// --- مراقبة حالة تسجيل الدخول عند تحميل الصفحة ---
onAuthStateChanged(auth, async (user)=>{
  if(user){
    const uid = user.uid;
    const adminSnap = await get(ref(db, `admins/${uid}`));
    const isAdmin = adminSnap.exists() && adminSnap.val() === true;

    if(isAdmin){
      loginDiv.style.display="none";
      adminPanel.style.display="block";
      logoutBtn.style.display = "block";
      loadScripts();
      loadChat();
    } else {
      loginDiv.style.display="block";
      adminPanel.style.display="none";
      logoutBtn.style.display = "block"; // يظهر تسجيل خروج لو مستخدم عادي
    }
  } else {
    loginDiv.style.display="block";
    adminPanel.style.display="none";
    logoutBtn.style.display = "none";
  }
});

// --- إدارة السكربتات ---
async function loadScripts(){
  scriptsList.innerHTML="";
  const snapshot = await get(ref(db,"scripts"));
  if(snapshot.exists()){
    const scripts = snapshot.val();
    for(const key in scripts){
      const li = document.createElement("li");
      li.innerHTML=`<b>${scripts[key].title}</b> (${scripts[key].category}) - المؤلف: ${scripts[key].author || 'مجهول'}`;

      const delBtn = document.createElement("button");
      delBtn.textContent="حذف";
      delBtn.onclick=async ()=>{
        if(confirm("هل تريد حذف هذا السكربت؟")){
          await remove(ref(db, `scripts/${key}`));
          loadScripts();
        }
      };

      const editBtn = document.createElement("button");
      editBtn.textContent="تعديل";
      editBtn.onclick=()=> editScript(key, scripts[key]);

      li.appendChild(delBtn);
      li.appendChild(editBtn);
      scriptsList.appendChild(li);
    }
  } else scriptsList.textContent="لا يوجد سكربتات حالياً";
}

document.getElementById("addScriptBtn").onclick = async ()=>{
  const title = document.getElementById("newTitle").value.trim();
  const code = document.getElementById("newCode").value.trim();
  const category = document.getElementById("newCategory").value;
  if(!title||!code||!category) return alert("مطلوب كل الحقول");

  const newScriptRef = push(ref(db,"scripts"));
  await set(newScriptRef,{
    title, code, category, author:"سكربت من الإدارة", timestamp:Date.now()
  });

  document.getElementById("newTitle").value="";
  document.getElementById("newCode").value="";
  document.getElementById("newCategory").value="";
  loadScripts();
};

function editScript(key, script){
  const newTitle = prompt("عدل عنوان السكربت:", script.title);
  const newCode = prompt("عدل كود السكربت:", script.code);
  const newCategory = prompt("عدل القسم:", script.category);

  if(newTitle && newCode && newCategory){
    update(ref(db, `scripts/${key}`), { title:newTitle, code:newCode, category:newCategory, author:script.author });
    loadScripts();
  }
}

// --- إدارة الشات ---
async function loadChat(){
  chatContainer.innerHTML="";
  const chatRef = ref(db,"chat");

  onChildAdded(chatRef,(snapshot)=>{
    const msg = snapshot.val();
    const div = document.createElement("div");
    div.style.background="#0d1117";
    div.style.color="#c9d1d9";
    div.style.padding="8px";
    div.style.borderRadius="8px";
    div.style.marginBottom="4px";

    div.innerHTML=`<b>${msg.username}</b>: ${msg.text} <button style="margin-left:8px;">حذف</button> <button style="margin-left:4px;">تعديل</button>`;

    const delBtn = div.querySelectorAll("button")[0];
    delBtn.onclick = async ()=>{
      if(confirm("هل تريد حذف الرسالة؟")){
        await remove(ref(db, `chat/${snapshot.key}`));
        div.remove();
      }
    };

    const editBtn = div.querySelectorAll("button")[1];
    editBtn.onclick = async ()=>{
      const newText = prompt("عدل الرسالة:", msg.text);
      if(newText){
        await update(ref(db, `chat/${snapshot.key}`), { text:newText });
        div.innerHTML=`<b>${msg.username}</b>: ${newText} <button style="margin-left:8px;">حذف</button> <button style="margin-left:4px;">تعديل</button>`;
      }
    };

    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  });
}
</script>
</body>
</html>
