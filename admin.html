<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الأدمن</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>لوحة الأدمن</h1>
<button id="logoutBtn">تسجيل خروج</button>

<!-- إدارة السكربتات -->
<div id="adminPanelContent">
  <h3>نشر سكربت جديد</h3>
  <input type="text" id="newTitle" placeholder="عنوان السكربت">
  <textarea id="newCode" id="newCode" placeholder="كود السكربت" rows="4"></textarea>
  <select id="newCategory">
    <option value="">اختر القسم</option>
    <option value="game">Game Scripts</option>
    <option value="admin">Admin Scripts</option>
    <option value="سكربت من الادارة">سكربت من الإدارة</option>
  </select>
  <button id="addScriptBtn">نشر</button>

  <hr>

  <h3>جميع السكربتات</h3>
  <ul id="scriptsList"></ul>

  <hr>

  <h3>شات المستخدمين</h3>
  <div id="chatContainer" style="max-height:300px; overflow:auto; background:#161b22; padding:1rem; border-radius:10px;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, get, push, set, remove, update, onChildAdded } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

// إعداد Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
  authDomain: "ccraft-space-scripts.firebaseapp.com",
  databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
  projectId: "ccraft-space-scripts",
  storageBucket: "ccraft-space-scripts.firebasestorage.app",
  messagingSenderId: "816078027492",
  appId: "1:816078027492:web:6472cce474078fd4d90af1",
  measurementId: "G-MHDM7YYYBN"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// عناصر HTML
const logoutBtn = document.getElementById("logoutBtn");
const scriptsList = document.getElementById("scriptsList");
const chatContainer = document.getElementById("chatContainer");
const newTitle = document.getElementById("newTitle");
const newCode = document.getElementById("newCode");
const newCategory = document.getElementById("newCategory");
const addScriptBtn = document.getElementById("addScriptBtn");

// تسجيل خروج الأدمن
logoutBtn.addEventListener("click", async ()=>{
  await signOut(auth);
  window.location.href = "login.html";
});

// حماية صفحة الأدمن + تحميل البيانات
onAuthStateChanged(auth, async user=>{
  if(!user){
    window.location.href = "login.html";
    return;
  }

  const idTokenResult = await user.getIdTokenResult();
  if(!idTokenResult.claims.admin){
    alert("غير مسموح بالدخول");
    window.location.href = "index.html";
    return;
  }

  loadScripts();
  loadChat();
});

// --- إدارة السكربتات ---
async function loadScripts(){
  scriptsList.innerHTML = "";
  const snapshot = await get(ref(db, "scripts"));
  if(snapshot.exists()){
    const scripts = snapshot.val();
    for(const key in scripts){
      const li = document.createElement("li");
      li.innerHTML = `<b>${scripts[key].title}</b> (${scripts[key].category}) - المؤلف: ${scripts[key].author || 'مجهول'}`;

      const delBtn = document.createElement("button");
      delBtn.textContent="حذف";
      delBtn.onclick = async ()=>{
        if(confirm("هل تريد حذف هذا السكربت؟")){
          await remove(ref(db, `scripts/${key}`));
          loadScripts();
        }
      };

      const editBtn = document.createElement("button");
      editBtn.textContent="تعديل";
      editBtn.onclick = ()=> editScript(key, scripts[key]);

      li.appendChild(delBtn);
      li.appendChild(editBtn);
      scriptsList.appendChild(li);
    }
  } else scriptsList.textContent="لا يوجد سكربتات حالياً";
}

addScriptBtn.addEventListener("click", async ()=>{
  const title = newTitle.value.trim();
  const code = newCode.value.trim();
  const category = newCategory.value;
  if(!title || !code || !category) return alert("مطلوب كل الحقول");

  const newScriptRef = push(ref(db,"scripts"));
  await set(newScriptRef, { title, code, category, author:"سكربت من الإدارة", timestamp:Date.now() });

  newTitle.value="";
  newCode.value="";
  newCategory.value="";
  loadScripts();
});

function editScript(key, script){
  const newT = prompt("عدل عنوان السكربت:", script.title);
  const newC = prompt("عدل كود السكربت:", script.code);
  const newCat = prompt("عدل القسم:", script.category);
  if(newT && newC && newCat){
    update(ref(db, `scripts/${key}`), { title:newT, code:newC, category:newCat, author:script.author });
    loadScripts();
  }
}

// --- إدارة الشات ---
async function loadChat(){
  chatContainer.innerHTML="";
  const chatRef = ref(db,"chat");
  onChildAdded(chatRef,(snapshot)=>{
    const msg = snapshot.val();
    const div = document.createElement("div");
    div.style.background="#0d1117";
    div.style.color="#c9d1d9";
    div.style.padding="8px";
    div.style.borderRadius="8px";
    div.style.marginBottom="4px";

    div.innerHTML = `<b>${msg.username}</b>: ${msg.text} <button style="margin-left:8px;">حذف</button> <button style="margin-left:4px;">تعديل</button>`;

    const delBtn = div.querySelectorAll("button")[0];
    delBtn.onclick = async ()=>{
      if(confirm("هل تريد حذف الرسالة؟")){
        await remove(ref(db, `chat/${snapshot.key}`));
        div.remove();
      }
    };

    const editBtn = div.querySelectorAll("button")[1];
    editBtn.onclick = async ()=>{
      const newText = prompt("عدل الرسالة:", msg.text);
      if(newText){
        await update(ref(db, `chat/${snapshot.key}`), { text:newText });
        div.innerHTML = `<b>${msg.username}</b>: ${newText} <button style="margin-left:8px;">حذف</button> <button style="margin-left:4px;">تعديل</button>`;
      }
    };

    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  });
}
</script>
</body>
</html>
