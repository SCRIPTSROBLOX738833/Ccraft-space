<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول / لوحة الإدارة</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, get, set, push, remove, update, onChildAdded } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
  authDomain: "ccraft-space-scripts.firebaseapp.com",
  databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
  projectId: "ccraft-space-scripts",
  storageBucket: "ccraft-space-scripts.firebasestorage.app",
  messagingSenderId: "816078027492",
  appId: "1:816078027492:web:6472cce474078fd4d90af1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// --- عناصر HTML ---
const loginDiv = document.createElement("div");
const adminPanel = document.createElement("div");
const userPanel = document.createElement("div");

// ---- إعداد loginDiv ----
loginDiv.innerHTML=`
<h2>تسجيل الدخول / إنشاء حساب</h2>
<input type="email" id="email" placeholder="البريد الإلكتروني"><br><br>
<input type="password" id="password" placeholder="كلمة المرور"><br><br>
<button id="loginBtn">دخول</button>
<button id="registerBtn">إنشاء حساب</button>
<p id="loginError" style="color:red;"></p>
`;
document.body.appendChild(loginDiv);

// ---- إعداد userPanel ----
userPanel.innerHTML=`
<h1>مرحبا بالمستخدم</h1>
<button id="userLogoutBtn">تسجيل خروج</button>
`;
userPanel.style.display="none";
document.body.appendChild(userPanel);

// ---- إعداد adminPanel ----
adminPanel.innerHTML=`
<h1>لوحة الإدارة</h1>
<h3>نشر سكربت جديد</h3>
<input type="text" id="newTitle" placeholder="عنوان السكربت">
<textarea id="newCode" placeholder="كود السكربت" rows="4"></textarea>
<select id="newCategory">
  <option value="">اختر القسم</option>
  <option value="game">Game Scripts</option>
  <option value="admin">Admin Scripts</option>
  <option value="سكربت من الادارة">سكربت من الإدارة</option>
</select>
<button id="addScriptBtn">نشر</button>
<hr>
<h3>جميع السكربتات</h3>
<ul id="scriptsList"></ul>
<hr>
<h3>شات المستخدمين</h3>
<div id="chatContainer" style="max-height:300px; overflow:auto; background:#161b22; padding:1rem; border-radius:10px;"></div>
<button id="adminLogoutBtn" style="margin-top:1rem;">تسجيل خروج</button>
`;
adminPanel.style.display="none";
document.body.appendChild(adminPanel);

// --- تسجيل دخول ---
document.getElementById("loginBtn").onclick = async ()=>{
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const loginError = document.getElementById("loginError");
  if(!email || !password){ loginError.textContent="ادخل البريد وكلمة المرور"; return; }

  try{
    const userCredential = await signInWithEmailAndPassword(auth,email,password);
    const uid = userCredential.user.uid;

    // تحقق إذا المستخدم أدمن من قاعدة البيانات
    const adminSnap = await get(ref(db, `admins/${uid}`));
    if(adminSnap.exists() && adminSnap.val() === true){
      loginDiv.style.display="none";
      adminPanel.style.display="block";
      loadScripts();
      loadChat();
    } else {
      loginDiv.style.display="none";
      userPanel.style.display="block";
    }
  }catch(err){
    loginError.textContent="خطأ في البريد أو كلمة المرور";
  }
};

// --- تسجيل مستخدم جديد ---
document.getElementById("registerBtn").onclick = async ()=>{
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const loginError = document.getElementById("loginError");
  if(!email || !password){ loginError.textContent="ادخل البريد وكلمة المرور"; return; }

  try{
    await createUserWithEmailAndPassword(auth,email,password);
    alert("تم إنشاء الحساب بنجاح، الآن سجل الدخول");
  }catch(err){
    loginError.textContent="حدث خطأ أو البريد مستخدم بالفعل";
  }
};

// --- تسجيل خروج ---
document.getElementById("userLogoutBtn").onclick = async ()=>{ await signOut(auth); window.location.reload(); };
document.getElementById("adminLogoutBtn").onclick = async ()=>{ await signOut(auth); window.location.reload(); };

// --- مراقبة حالة تسجيل الدخول عند تحميل الصفحة ---
onAuthStateChanged(auth, async (user)=>{
  if(user){
    const uid = user.uid;
    const adminSnap = await get(ref(db, `admins/${uid}`));
    if(adminSnap.exists() && adminSnap.val() === true){
      loginDiv.style.display="none";
      adminPanel.style.display="block";
      loadScripts();
      loadChat();
    } else {
      loginDiv.style.display="none";
      userPanel.style.display="block";
    }
  } else {
    loginDiv.style.display="block";
    userPanel.style.display="none";
    adminPanel.style.display="none";
  }
});

// --- إدارة السكربتات ---
const scriptsList = document.getElementById("scriptsList");
document.getElementById("addScriptBtn").onclick = async ()=>{
  const title = document.getElementById("newTitle").value.trim();
  const code = document.getElementById("newCode").value.trim();
  const category = document.getElementById("newCategory").value;
  if(!title||!code||!category) return alert("مطلوب كل الحقول");

  const newScriptRef = push(ref(db,"scripts"));
  await set(newScriptRef,{ title, code, category, author:"سكربت من الإدارة", timestamp:Date.now() });

  document.getElementById("newTitle").value="";
  document.getElementById("newCode").value="";
  document.getElementById("newCategory").value="";
  loadScripts();
};

async function loadScripts(){
  scriptsList.innerHTML="";
  const snapshot = await get(ref(db,"scripts"));
  if(snapshot.exists()){
    const scripts = snapshot.val();
    for(const key in scripts){
      const li = document.createElement("li");
      li.innerHTML=`<b>${scripts[key].title}</b> (${scripts[key].category}) - المؤلف: ${scripts[key].author || 'مجهول'}`;

      const delBtn = document.createElement("button");
      delBtn.textContent="حذف";
      delBtn.onclick=async ()=>{
        if(confirm("هل تريد حذف هذا السكربت؟")){
          await remove(ref(db, `scripts/${key}`));
          loadScripts();
        }
      };

      const editBtn = document.createElement("button");
      editBtn.textContent="تعديل";
      editBtn.onclick=()=> editScript(key, scripts[key]);

      li.appendChild(delBtn);
      li.appendChild(editBtn);
      scriptsList.appendChild(li);
    }
  } else scriptsList.textContent="لا يوجد سكربتات حالياً";
}

function editScript(key, script){
  const newTitle = prompt("عدل عنوان السكربت:", script.title);
  const newCode = prompt("عدل كود السكربت:", script.code);
  const newCategory = prompt("عدل القسم:", script.category);

  if(newTitle && newCode && newCategory){
    update(ref(db, `scripts/${key}`), { title:newTitle, code:newCode, category:newCategory, author:script.author });
    loadScripts();
  }
}

// --- إدارة الشات ---
const chatContainer = document.getElementById("chatContainer");
async function loadChat(){
  chatContainer.innerHTML="";
  const chatRef = ref(db,"chat");

  onChildAdded(chatRef,(snapshot)=>{
    const msg = snapshot.val();
    const div = document.createElement("div");
    div.style.background="#0d1117";
    div.style.color="#c9d1d9";
    div.style.padding="8px";
    div.style.borderRadius="8px";
    div.style.marginBottom="4px";

    div.innerHTML=`<b>${msg.username}</b>: ${msg.text} <button style="margin-left:8px;">حذف</button> <button style="margin-left:4px;">تعديل</button>`;

    const delBtn = div.querySelectorAll("button")[0];
    delBtn.onclick = async ()=>{
      if(confirm("هل تريد حذف الرسالة؟")){
        await remove(ref(db, `chat/${snapshot.key}`));
        div.remove();
      }
    };

    const editBtn = div.querySelectorAll("button")[1];
    editBtn.onclick = async ()=>{
      const newText = prompt("عدل الرسالة:", msg.text);
      if(newText){
        await update(ref(db, `chat/${snapshot.key}`), { text:newText });
        div.innerHTML=`<b>${msg.username}</b>: ${newText} <button style="margin-left:8px;">حذف</button> <button style="margin-left:4px;">تعديل</button>`;
      }
    };

    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  });
}
</script>
</head>
<body></body>
</html>
