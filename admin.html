<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loginDiv">
    <h2>تسجيل الدخول</h2>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
    <p id="loginError" style="color:red;"></p>
  </div>

  <div id="adminPanel" style="display:none;">
    <h1>لوحة الإدارة</h1>
    <ul id="scriptsList"></ul>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
      authDomain: "ccraft-space-scripts.firebaseapp.com",
      databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
      projectId: "ccraft-space-scripts",
      storageBucket: "ccraft-space-scripts.firebasestorage.app",
      messagingSenderId: "816078027492",
      appId: "1:816078027492:web:6472cce474078fd4d90af1",
      measurementId: "G-MHDM7YYYBN"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const loginDiv = document.getElementById("loginDiv");
    const adminPanel = document.getElementById("adminPanel");
    const loginError = document.getElementById("loginError");
    const scriptsList = document.getElementById("scriptsList");

    window.login = () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => loadScripts())
        .catch(() => loginError.textContent = "خطأ في البريد الإلكتروني أو كلمة المرور");
    };

    onAuthStateChanged(auth, user => {
      if(user) loadScripts();
    });

    async function loadScripts(){
      loginDiv.style.display = "none";
      adminPanel.style.display = "block";

      const snapshot = await get(ref(db, "scripts"));
      scriptsList.innerHTML = "";

      if(snapshot.exists()){
        const scripts = snapshot.val();
        for(const key in scripts){
          const li = document.createElement("li");
          li.textContent = scripts[key].title + " ";

          const delBtn = document.createElement("button");
          delBtn.textContent = "حذف";
          delBtn.onclick = async () => {
            if(confirm("هل أنت متأكد من حذف هذا السكربت؟")){
              await remove(ref(db, `scripts/${key}`));
              loadScripts();
            }
          };

          li.appendChild(delBtn);
          scriptsList.appendChild(li);
        }
      } else {
        scriptsList.textContent = "لا يوجد سكربتات حالياً";
      }
    }
  </script>
</body>
</html>
