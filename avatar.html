<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCRAFT SPACE | شخصيتي</title>
<link rel="stylesheet" href="styles.css">
<style>

/* ============================================================
   Avatar Editor Layout
   ============================================================ */

.av-layout {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px 80px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
    align-items: start;
}

/* ---- Preview Panel ---- */

.preview-panel {
    position: sticky;
    top: 100px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 24px;
    padding: 32px 24px;
    text-align: center;
    animation: fadeIn 0.5s ease both;
}

.preview-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 4px;
    background: var(--accent-gradient);
    border-radius: 24px 24px 0 0;
}

.avatar-stage {
    width: 160px;
    height: 160px;
    margin: 0 auto 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a14;
    border: 3px solid rgba(139,92,246,0.3);
    box-shadow: 0 0 30px rgba(139,92,246,0.2), inset 0 0 20px rgba(0,0,0,0.5);
    transition: box-shadow 0.4s ease;
    overflow: hidden;
}

.avatar-stage:hover {
    box-shadow: 0 0 50px rgba(139,92,246,0.4), inset 0 0 20px rgba(0,0,0,0.5);
}

.preview-name {
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--text-main);
    margin-bottom: 4px;
}

.preview-email {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 20px;
}

#saveBtn {
    width: 100%;
    background: var(--accent-gradient);
    color: white;
    border: none;
    border-radius: var(--radius-btn);
    padding: 14px;
    font-size: 1rem;
    box-shadow: 0 8px 20px rgba(139,92,246,0.3);
    margin-bottom: 10px;
}

#resetBtn {
    width: 100%;
    background: rgba(255,255,255,0.04);
    color: var(--text-muted);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-btn);
    padding: 11px;
    font-size: 0.88rem;
    margin: 0;
}

.save-msg {
    font-size: 0.78rem;
    color: var(--success);
    margin-top: 10px;
    min-height: 18px;
    transition: opacity 0.3s;
}


/* ---- Editor Panel ---- */

.editor-panel {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.editor-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 22px 24px;
    animation: fadeIn 0.5s ease both;
}

.editor-card h3 {
    font-size: 0.8rem;
    font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.editor-card h3::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-color);
}


/* ---- Color Swatches ---- */

.swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.swatch {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    flex-shrink: 0;
}

.swatch:hover { transform: scale(1.2); }

.swatch.active {
    border-color: white;
    box-shadow: 0 0 0 2px var(--primary);
    transform: scale(1.15);
}


/* ---- Style Buttons ---- */

.style-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.style-btn {
    background: rgba(255,255,255,0.04);
    color: var(--text-muted);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 9px 16px;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
    font-family: 'Tajawal', sans-serif;
    margin: 0;
}

.style-btn:hover {
    border-color: rgba(139,92,246,0.4);
    color: var(--text-main);
    transform: translateY(-2px);
    filter: none;
}

.style-btn.active {
    background: var(--primary-dim);
    color: var(--primary);
    border-color: rgba(139,92,246,0.4);
    transform: none;
}


/* ---- Responsive ---- */

@media (max-width: 700px) {
    .av-layout {
        grid-template-columns: 1fr;
    }
    .preview-panel {
        position: static;
    }
}

</style>
</head>
<body>

<header>
    <button onclick="location.href='profile.html'">👤 البروفايل</button>
    <button class="nav-button" onclick="location.href='index.html'">رجوع للصفحة الرئيسية</button>
</header>


<div style="max-width:960px;margin:28px auto 20px;padding:0 20px">
    <h1 style="font-size:clamp(1.6rem,4vw,2.2rem);font-weight:900;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px">
        🎭 شخصيتي
    </h1>
    <p style="color:var(--text-muted);font-size:0.92rem">خصّص شخصيتك وهتظهر في التعليقات والشات</p>
</div>


<div class="av-layout">

    <!-- Preview -->
    <div class="preview-panel">
        <div class="avatar-stage" id="avatarStage"></div>
        <div class="preview-name"  id="previewName">—</div>
        <div class="preview-email" id="previewEmail">—</div>
        <button id="saveBtn">💾 حفظ الشخصية</button>
        <button id="resetBtn">↩️ إعادة تعيين</button>
        <div class="save-msg" id="saveMsg"></div>
    </div>


    <!-- Editor -->
    <div class="editor-panel">

        <!-- لون البشرة -->
        <div class="editor-card">
            <h3>🎨 لون البشرة</h3>
            <div class="swatches" id="skin-swatches"></div>
        </div>

        <!-- الشعر -->
        <div class="editor-card">
            <h3>💇 الشعر</h3>
            <p style="color:var(--text-muted);font-size:0.78rem;margin-bottom:10px">الشكل</p>
            <div class="style-grid" id="hair-style-btns"></div>
            <p style="color:var(--text-muted);font-size:0.78rem;margin:14px 0 10px">اللون</p>
            <div class="swatches" id="hair-swatches"></div>
        </div>

        <!-- العيون -->
        <div class="editor-card">
            <h3>👁️ العيون</h3>
            <p style="color:var(--text-muted);font-size:0.78rem;margin-bottom:10px">الشكل</p>
            <div class="style-grid" id="eye-style-btns"></div>
            <p style="color:var(--text-muted);font-size:0.78rem;margin:14px 0 10px">اللون</p>
            <div class="swatches" id="eye-swatches"></div>
        </div>

        <!-- الشفايف -->
        <div class="editor-card">
            <h3>👄 الشفايف</h3>
            <div class="swatches" id="lip-swatches"></div>
        </div>

        <!-- الملابس -->
        <div class="editor-card">
            <h3>👕 الملابس</h3>
            <p style="color:var(--text-muted);font-size:0.78rem;margin-bottom:10px">الشكل</p>
            <div class="style-grid" id="outfit-style-btns"></div>
            <p style="color:var(--text-muted);font-size:0.78rem;margin:14px 0 10px">اللون</p>
            <div class="swatches" id="outfit-swatches"></div>
        </div>

        <!-- الإكسسوار -->
        <div class="editor-card">
            <h3>✨ إكسسوار</h3>
            <div class="style-grid" id="accessory-btns"></div>
        </div>

    </div>
</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
import {
    buildAvatar, DEFAULT_CHAR, AVATAR_OPTIONS,
    HAIR_STYLES, OUTFIT_STYLES, EYE_STYLES, ACCESSORY_STYLES
} from './avatar.js';

const firebaseConfig = {
    apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
    authDomain: "ccraft-space-scripts.firebaseapp.com",
    databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
    projectId: "ccraft-space-scripts",
    storageBucket: "ccraft-space-scripts.firebasestorage.app",
    messagingSenderId: "816078027492",
    appId: "1:816078027492:web:6472cce474078fd4d90af1",
    measurementId: "G-MHDM7YYYBN"
};

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);

let char = { ...DEFAULT_CHAR };
let currentUser = null;

const LABELS = {
    hair:      { short:'قصير', long:'طويل', curly:'مجعد', bun:'كعكة', mohawk:'موهوك', none:'بدون' },
    eye:       { normal:'عادي', happy:'سعيد', cool:'كول', sleepy:'نعسان' },
    outfit:    { hoodie:'هودي', tshirt:'تيشيرت', suit:'بدلة', jacket:'جاكيت', robe:'عباءة' },
    accessory: { none:'بدون', glasses:'نظارة', crown:'تاج', headphones:'سماعة', hat:'قبعة' },
};


/* ============================================================
   Auth
   ============================================================ */

onAuthStateChanged(auth, async user => {
    if (!user) { location.href = 'login.html'; return; }
    currentUser = user;
    const name = user.email.split('@')[0];
    document.getElementById('previewName').innerText  = name;
    document.getElementById('previewEmail').innerText = user.email;

    // جيب الشخصية المحفوظة
    const snap = await get(ref(db, `users/${user.uid}/avatar`));
    if (snap.exists()) char = { ...DEFAULT_CHAR, ...snap.val() };

    buildUI();
    updatePreview();
});


/* ============================================================
   بناء الـ UI
   ============================================================ */

function buildUI() {
    // Swatches
    makeSwatches('skin-swatches',   AVATAR_OPTIONS.skinColors,   'skinColor');
    makeSwatches('hair-swatches',   AVATAR_OPTIONS.hairColors,   'hairColor');
    makeSwatches('eye-swatches',    AVATAR_OPTIONS.eyeColors,    'eyeColor');
    makeSwatches('lip-swatches',    AVATAR_OPTIONS.lipColors,    'lipColor');
    makeSwatches('outfit-swatches', AVATAR_OPTIONS.outfitColors, 'outfitColor');

    // Style buttons
    makeStyleBtns('hair-style-btns',   HAIR_STYLES,      'hairStyle',   LABELS.hair);
    makeStyleBtns('eye-style-btns',    EYE_STYLES,       'eyeStyle',    LABELS.eye);
    makeStyleBtns('outfit-style-btns', OUTFIT_STYLES,    'outfitStyle', LABELS.outfit);
    makeStyleBtns('accessory-btns',    ACCESSORY_STYLES, 'accessory',   LABELS.accessory);
}

function makeSwatches(containerId, colors, prop) {
    const container = document.getElementById(containerId);
    colors.forEach(color => {
        const sw = document.createElement('div');
        sw.className = 'swatch' + (char[prop] === color ? ' active' : '');
        sw.style.background = color;
        sw.title = color;
        sw.onclick = () => {
            char[prop] = color;
            container.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            sw.classList.add('active');
            updatePreview();
        };
        container.appendChild(sw);
    });
}

function makeStyleBtns(containerId, options, prop, labels) {
    const container = document.getElementById(containerId);
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'style-btn' + (char[prop] === opt ? ' active' : '');
        btn.innerText = labels[opt] || opt;
        btn.onclick = () => {
            char[prop] = opt;
            container.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updatePreview();
        };
        container.appendChild(btn);
    });
}


/* ============================================================
   Preview
   ============================================================ */

function updatePreview() {
    const stage = document.getElementById('avatarStage');
    stage.innerHTML = buildAvatar(char, 160);
}


/* ============================================================
   Save
   ============================================================ */

document.getElementById('saveBtn').onclick = async () => {
    if (!currentUser) return;
    const btn = document.getElementById('saveBtn');
    const msg = document.getElementById('saveMsg');
    btn.disabled  = true;
    btn.innerText = '⏳ جارٍ الحفظ...';
    await set(ref(db, `users/${currentUser.uid}/avatar`), char);
    btn.disabled  = false;
    btn.innerText = '💾 حفظ الشخصية';
    msg.innerText = '✅ تم حفظ الشخصية!';
    setTimeout(() => msg.innerText = '', 3000);
};

document.getElementById('resetBtn').onclick = () => {
    char = { ...DEFAULT_CHAR };
    document.getElementById('editor-panel')?.querySelectorAll('.swatch,.style-btn').forEach(el => el.classList.remove('active'));
    // rebuild
    document.querySelectorAll('.swatches, .style-grid').forEach(el => el.innerHTML = '');
    buildUI();
    updatePreview();
};

</script>
</body>
</html>
