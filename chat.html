<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات مباشر</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    margin: 0;
    background: #f0f2f5;
  }

  header {
    padding: 15px;
    background: #4a76a8;
    color: white;
    text-align: center;
    font-size: 1.3rem;
    font-weight: bold;
  }

  #chatContainer {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #e5ddd5;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .message {
    max-width: 70%;
    padding: 10px 15px;
    border-radius: 15px;
    word-wrap: break-word;
    font-size: 0.95rem;
    line-height: 1.3;
  }

  .message.me {
    align-self: flex-end;
    background: #dcf8c6;
  }

  .message.other {
    align-self: flex-start;
    background: #fff;
  }

  .message strong {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
  }

  #messageForm {
    display: flex;
    padding: 10px;
    background: #f0f2f5;
    border-top: 1px solid #ccc;
  }

  #messageInput {
    flex: 1;
    padding: 10px 15px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 1rem;
    transition: all 0.2s;
  }

  #messageInput:focus {
    border-color: #4a76a8;
    box-shadow: 0 0 5px rgba(74, 118, 168, 0.5);
  }

  #sendBtn {
    margin-left: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #4a76a8;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }

  #sendBtn:hover {
    background: #365a80;
  }

</style>
</head>
<body>

<header>شات مباشر</header>
<div id="chatContainer"></div>

<form id="messageForm">
  <input type="text" id="messageInput" placeholder="اكتب رسالتك..." required />
  <button type="submit" id="sendBtn">ارسال</button>
</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

// بيانات Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
  authDomain: "ccraft-space-scripts.firebaseapp.com",
  databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
  projectId: "ccraft-space-scripts",
  storageBucket: "ccraft-space-scripts.firebasestorage.app",
  messagingSenderId: "816078027492",
  appId: "1:816078027492:web:6472cce474078fd4d90af1",
  measurementId: "G-MHDM7YYYBN"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getDatabase(app);

const chatContainer = document.getElementById("chatContainer");
const messageForm = document.getElementById("messageForm");
const messageInput = document.getElementById("messageInput");

// اطلب من المستخدم كتابة اسمه مرة واحدة فقط
let username = localStorage.getItem("chatUsername");
if (!username) {
  username = prompt("اكتب اسمك:");
  if (!username) username = "ضيف";
  localStorage.setItem("chatUsername", username);
}

// مرجع قاعدة البيانات للشات
const chatRef = ref(db, "chat");

// عرض الرسائل الجديدة تلقائياً
onChildAdded(chatRef, (snapshot) => {
  const msg = snapshot.val();
  const div = document.createElement("div");
  div.classList.add("message");
  if (msg.user === username) {
    div.classList.add("me");
  } else {
    div.classList.add("other");
  }
  div.innerHTML = `<strong>${msg.user}</strong> ${msg.text}`;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
});

// ارسال رسالة
messageForm.addEventListener("submit", (e) => {
  e.preventDefault();
  const text = messageInput.value.trim();
  if (text) {
    push(chatRef, { user: username, text });
    messageInput.value = "";
  }
});
</script>

</body>
</html>
