<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCRAFT SPACE | شات</title>
<link rel="stylesheet" href="styles.css">
<style>

/* ============================================================
   Chat Page Layout — Full Screen
   ============================================================ */

body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

header { flex-shrink: 0; }

.chat-layout {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 0 0 0;
    min-height: 0;
}


/* ============================================================
   Chat Header Bar
   ============================================================ */

.chat-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border-color);
    flex-shrink: 0;
}

.ch-icon {
    width: 42px; height: 42px;
    border-radius: 14px;
    background: var(--accent-gradient);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    box-shadow: 0 4px 14px rgba(139,92,246,0.35);
    flex-shrink: 0;
}

.ch-info { flex: 1; }
.ch-name { font-size: 1rem; font-weight: 900; color: var(--text-main); }
.ch-status {
    font-size: 0.72rem;
    color: var(--success);
    display: flex;
    align-items: center;
    gap: 5px;
}

.ch-status::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: blink 1.5s ease infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.ch-online {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 50px;
    padding: 5px 12px;
    font-size: 0.72rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
}

.ch-online .dot { width:6px;height:6px;border-radius:50%;background:var(--success); }


/* ============================================================
   Messages Area
   ============================================================ */

#chatBox {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 0;
    scroll-behavior: smooth;
}

/* Date separator */
.date-sep {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 14px 0 8px;
    color: var(--text-muted);
    font-size: 0.72rem;
    font-weight: 700;
}

.date-sep::before, .date-sep::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-color);
}

/* Message group */
.msg-group {
    display: flex;
    gap: 10px;
    margin-bottom: 2px;
    position: relative;
}

.msg-group.own {
    flex-direction: row-reverse;
}

/* Avatar */
.msg-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    overflow: hidden;
    border: 1.5px solid rgba(139,92,246,0.25);
    flex-shrink: 0;
    background: #0a0a14;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: var(--transition);
    align-self: flex-end;
    font-size: 0.85rem;
    font-weight: 900;
    color: white;
}

.msg-group.own .msg-avatar { background: var(--accent-gradient); border-color: rgba(139,92,246,0.4); }
.msg-avatar:hover { transform: scale(1.12); border-color: var(--primary); }

/* Bubble column */
.msg-col {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: 72%;
    min-width: 0;
}

.msg-group.own .msg-col { align-items: flex-end; }

/* Username */
.msg-username {
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--primary);
    padding: 0 6px;
    cursor: pointer;
}

.msg-username:hover { text-decoration: underline; }
.msg-group.own .msg-username { display: none; }

/* Bubble */
.msg-bubble {
    position: relative;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 0.92rem;
    line-height: 1.6;
    word-break: break-word;
    max-width: 100%;
    transition: background 0.2s;
}

/* Others bubble */
.msg-group:not(.own) .msg-bubble {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-bottom-right-radius: 6px;
    color: var(--text-main);
}

/* Own bubble */
.msg-group.own .msg-bubble {
    background: var(--accent-gradient);
    color: white;
    border-bottom-left-radius: 6px;
    box-shadow: 0 4px 14px rgba(139,92,246,0.3);
}

.msg-bubble:hover { filter: brightness(1.05); }

/* Reply preview inside bubble */
.reply-preview {
    background: rgba(0,0,0,0.15);
    border-right: 3px solid rgba(255,255,255,0.4);
    border-radius: 8px;
    padding: 6px 10px;
    margin-bottom: 8px;
    font-size: 0.75rem;
    opacity: 0.85;
}

.msg-group:not(.own) .reply-preview {
    border-right-color: var(--primary);
    background: rgba(139,92,246,0.08);
}

.reply-preview .rp-name { font-weight: 800; margin-bottom: 2px; color: var(--primary); }
.msg-group.own .reply-preview .rp-name { color: rgba(255,255,255,0.8); }
.reply-preview .rp-text { color: var(--text-muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.msg-group.own .reply-preview .rp-text { color: rgba(255,255,255,0.7); }

/* Edited tag */
.edited-tag {
    font-size: 0.62rem;
    opacity: 0.6;
    margin-right: 4px;
}

/* Meta row (time + status) */
.msg-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 6px;
}

.msg-group.own .msg-meta { flex-direction: row-reverse; }

.msg-time { font-size: 0.65rem; color: var(--text-muted); }
.msg-read  { font-size: 0.7rem; color: var(--secondary); }

/* Reactions */
.msg-reactions {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 0 4px;
}

.reaction-pill {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 50px;
    padding: 3px 8px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--text-muted);
}

.reaction-pill:hover { border-color: var(--primary); background: var(--primary-dim); transform: scale(1.1); }
.reaction-pill.mine  { border-color: var(--primary); background: var(--primary-dim); color: var(--primary); }
.reaction-pill .rp-count { font-size: 0.7rem; font-weight: 800; }

/* Hover actions */
.msg-actions-hover {
    position: absolute;
    top: -34px;
    display: none;
    align-items: center;
    gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 50px;
    padding: 4px 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    z-index: 10;
    white-space: nowrap;
}

.msg-group.own .msg-actions-hover { left: 0; right: auto; }
.msg-group:not(.own) .msg-actions-hover { right: 0; left: auto; }

.msg-bubble:hover .msg-actions-hover,
.msg-col:hover .msg-actions-hover { display: flex; }

.act-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    padding: 0;
    margin: 0;
    color: var(--text-muted);
    min-width: unset;
}

.act-btn:hover { background: rgba(139,92,246,0.15); color: var(--text-main); transform: scale(1.15); filter: none; }

/* Emoji picker */
.emoji-picker {
    position: absolute;
    top: -44px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 6px 10px;
    display: none;
    gap: 6px;
    z-index: 20;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}

.emoji-picker.show { display: flex; }
.emoji-opt { font-size: 1.2rem; cursor: pointer; transition: transform 0.15s; padding: 2px; border-radius: 6px; }
.emoji-opt:hover { transform: scale(1.35); background: rgba(139,92,246,0.1); }

/* System message */
.sys-msg {
    text-align: center;
    font-size: 0.72rem;
    color: var(--text-muted);
    padding: 6px 0;
    font-weight: 700;
}


/* ============================================================
   Reply Bar (above input)
   ============================================================ */

#replyBar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(139,92,246,0.06);
    border-top: 1px solid rgba(139,92,246,0.2);
    font-size: 0.8rem;
    flex-shrink: 0;
}

.rb-text { flex: 1; color: var(--text-muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.rb-text strong { color: var(--primary); }
.rb-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; margin: 0; padding: 0; }
.rb-close:hover { color: var(--danger); filter: none; transform: none; }


/* ============================================================
   Typing Indicator
   ============================================================ */

#typingBar {
    padding: 4px 20px;
    font-size: 0.75rem;
    color: var(--text-muted);
    min-height: 22px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
}

.typing-dots { display: flex; gap: 4px; }
.typing-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--primary); animation: tdot 1.2s ease infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes tdot { 0%,60%,100%{opacity:0.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }


/* ============================================================
   Input Area
   ============================================================ */

.input-area {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 12px 16px 16px;
    background: var(--bg-card);
    border-top: 1px solid var(--border-color);
    flex-shrink: 0;
}

.input-wrap {
    flex: 1;
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: 22px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 16px;
    transition: var(--transition);
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.2);
}

.input-wrap:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.15), inset 0 2px 6px rgba(0,0,0,0.2);
}

#msgInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text-main);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.95rem;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
    direction: rtl;
}

#msgInput::placeholder { color: var(--text-muted); opacity: 0.7; }

.emoji-trigger {
    background: none;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 0;
    margin: 0;
    color: var(--text-muted);
    transition: var(--transition);
    flex-shrink: 0;
    min-width: unset;
    line-height: 1;
}

.emoji-trigger:hover { color: var(--text-main); transform: scale(1.2); filter: none; }

.quick-emojis {
    position: absolute;
    bottom: 80px;
    right: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 10px 14px;
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    max-width: 280px;
    z-index: 50;
    box-shadow: 0 8px 28px rgba(0,0,0,0.5);
}

.quick-emojis.show { display: flex; }
.q-emoji { font-size: 1.4rem; cursor: pointer; transition: transform 0.15s; border-radius: 8px; padding: 3px; }
.q-emoji:hover { transform: scale(1.3); background: rgba(139,92,246,0.1); }

/* Send button */
#sendBtn {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--accent-gradient);
    color: white;
    border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(139,92,246,0.4);
    transition: var(--transition);
    flex-shrink: 0;
    margin: 0;
    padding: 0;
    min-width: unset;
}

#sendBtn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(139,92,246,0.5); filter: none; }
#sendBtn:active { transform: scale(0.94); }
#sendBtn:disabled { opacity: 0.4; transform: none; }

/* Scroll to bottom button */
#scrollBtn {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent-gradient);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 0.8rem;
    font-weight: 800;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    box-shadow: 0 4px 14px rgba(139,92,246,0.4);
    display: none;
    gap: 6px;
    align-items: center;
    margin: 0;
    z-index: 40;
    animation: fadeIn 0.3s ease both;
}

#scrollBtn.show { display: flex; }

/* ============================================================
   Responsive
   ============================================================ */

@media (max-width: 600px) {
    .msg-col { max-width: 85%; }
    .quick-emojis { right: 10px; max-width: 240px; }
}

</style>
</head>
<body>

<header>
    <button class="nav-button" onclick="location.href='index.html'">رجوع للصفحة الرئيسية</button>
</header>

<!-- Chat Header -->
<div class="chat-layout">

    <div class="chat-header">
        <div class="ch-icon">💬</div>
        <div class="ch-info">
            <div class="ch-name">شات CCRAFT SPACE</div>
            <div class="ch-status">متصل</div>
        </div>
        <div class="ch-online">
            <div class="dot"></div>
            <span id="onlineCount">—</span> أونلاين
        </div>
    </div>

    <!-- Messages -->
    <div id="chatBox"></div>

    <!-- Typing -->
    <div id="typingBar"></div>

    <!-- Reply Bar -->
    <div id="replyBar">
        <span>↩️ رد على</span>
        <div class="rb-text" id="replyText">—</div>
        <button class="rb-close" onclick="cancelReply()">✕</button>
    </div>

    <!-- Input -->
    <div class="input-area" style="position:relative">
        <div class="quick-emojis" id="quickEmojis">
            😂 😍 🔥 👍 💎 🚀 😎 🤩 😭 💀 🥶 🤯 👑 💜 ⚡ 🎮 🏆 🎯 💯 🌟
            .split(' ').map(e=>`<span class="q-emoji">${e}</span>`).join('')
        </div>

        <div class="input-wrap">
            <button class="emoji-trigger" id="emojiTrigger" title="إيموجي">😊</button>
            <textarea id="msgInput" placeholder="اكتب رسالتك..." rows="1"></textarea>
        </div>

        <button id="sendBtn" title="إرسال">➤</button>
    </div>

</div>

<!-- Scroll to bottom -->
<button id="scrollBtn" onclick="scrollToBottom()">⬇️ رسائل جديدة</button>


<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, update, remove, get, set, onValue, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
import { buildAvatar, DEFAULT_CHAR } from './avatar.js';

const firebaseConfig = {
    apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
    authDomain: "ccraft-space-scripts.firebaseapp.com",
    databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
    projectId: "ccraft-space-scripts",
    storageBucket: "ccraft-space-scripts.firebasestorage.app",
    messagingSenderId: "816078027492",
    appId: "1:816078027492:web:6472cce474078fd4d90af1",
    measurementId: "G-MHDM7YYYBN"
};

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);

let currentUser  = null;
let replyTo      = null;  // { key, username, text }
let editingKey   = null;  // key of message being edited
let avatarCache  = {};
let lastDate     = null;
let typingTimer  = null;
let atBottom     = true;

const chatBox    = document.getElementById('chatBox');
const msgInput   = document.getElementById('msgInput');
const sendBtn    = document.getElementById('sendBtn');
const replyBar   = document.getElementById('replyBar');
const replyText  = document.getElementById('replyText');
const typingBar  = document.getElementById('typingBar');
const scrollBtn  = document.getElementById('scrollBtn');

const EMOJIS = ['😂','😍','🔥','👍','💎','🚀','😎','🤩','😭','💀','🥶','🤯','👑','💜','⚡','🎮','🏆','🎯','💯','🌟','❤️','✨','🫡','🤝','🎉'];
const REACT_EMOJIS = ['👍','❤️','😂','🔥','💎','👑'];


/* ============================================================
   Auth
   ============================================================ */

onAuthStateChanged(auth, async user => {
    if (!user) { alert('يجب تسجيل الدخول'); location.href='login.html'; return; }
    currentUser = user;
    await buildQuickEmojis();
    loadChat();
    trackPresence(user);
    trackTyping(user);
});


/* ============================================================
   Quick Emoji Panel
   ============================================================ */

function buildQuickEmojis() {
    const panel = document.getElementById('quickEmojis');
    panel.innerHTML = EMOJIS.map(e => `<span class="q-emoji">${e}</span>`).join('');
    panel.querySelectorAll('.q-emoji').forEach(el => {
        el.onclick = () => {
            msgInput.value += el.textContent;
            msgInput.focus();
            panel.classList.remove('show');
        };
    });
}

document.getElementById('emojiTrigger').onclick = () => {
    document.getElementById('quickEmojis').classList.toggle('show');
};

document.addEventListener('click', e => {
    if (!e.target.closest('#quickEmojis') && !e.target.closest('#emojiTrigger'))
        document.getElementById('quickEmojis').classList.remove('show');
});


/* ============================================================
   Avatar Helper
   ============================================================ */

async function getAvatar(uid, size = 34) {
    if (!uid) return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:var(--accent-gradient);display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:${size*0.35}px">?</div>`;
    if (avatarCache[uid]) return buildAvatar(avatarCache[uid], size);
    try {
        const snap = await get(ref(db, `users/${uid}/avatar`));
        const char = snap.exists() ? { ...DEFAULT_CHAR, ...snap.val() } : DEFAULT_CHAR;
        avatarCache[uid] = char;
        return buildAvatar(char, size);
    } catch { return buildAvatar(DEFAULT_CHAR, size); }
}


/* ============================================================
   Load Chat
   ============================================================ */

function loadChat() {
    onChildAdded(ref(db, 'chat'), async snapshot => {
        const msg = snapshot.val();
        const key = snapshot.key;
        if (!msg) return;

        const date    = msg.timestamp ? new Date(msg.timestamp) : new Date();
        const dateStr = date.toLocaleDateString('ar-EG', { weekday:'long', day:'numeric', month:'long' });

        if (dateStr !== lastDate) {
            lastDate = dateStr;
            const sep = document.createElement('div');
            sep.className = 'date-sep';
            sep.textContent = dateStr;
            chatBox.appendChild(sep);
        }

        const avatarHTML = await getAvatar(msg.userId, 34);
        const isOwn = msg.userId === currentUser.uid;
        const time  = date.toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });

        const el = document.createElement('div');
        el.className = `msg-group ${isOwn ? 'own' : ''}`;
        el.dataset.key = key;
        el.dataset.uid = msg.userId || '';

        el.innerHTML = buildMessageHTML(msg, key, isOwn, avatarHTML, time);
        chatBox.appendChild(el);

        attachActions(el, msg, key, isOwn);

        if (atBottom) scrollToBottom();
        else scrollBtn.classList.add('show');
    });

    // Listen for updates (edits/reactions)
    onValue(ref(db, 'chat'), snapshot => {
        if (!snapshot.exists()) return;
        snapshot.forEach(child => {
            const key = child.key;
            const msg = child.val();
            const el  = chatBox.querySelector(`[data-key="${key}"]`);
            if (!el) return;
            // Update reactions
            const reactDiv = el.querySelector('.msg-reactions');
            if (reactDiv) reactDiv.innerHTML = buildReactionsHTML(msg.reactions||{}, key);
            // Mark edited
            const editedTag = el.querySelector('.edited-tag');
            if (editedTag && msg.edited) editedTag.style.display = 'inline';
            // Update text
            const textEl = el.querySelector('.bubble-text');
            if (textEl && msg.text) textEl.textContent = msg.text;
        });
    });
}

function buildMessageHTML(msg, key, isOwn, avatarHTML, time) {
    const replyHTML = msg.replyTo ? `
        <div class="reply-preview">
            <div class="rp-name">↩️ ${msg.replyTo.username}</div>
            <div class="rp-text">${escapeHTML(msg.replyTo.text || '')}</div>
        </div>
    ` : '';

    const reactionsHTML = buildReactionsHTML(msg.reactions||{}, key);
    const editedHTML = msg.edited ? '<span class="edited-tag">(معدّل)</span>' : '<span class="edited-tag" style="display:none">(معدّل)</span>';

    return `
        <div class="msg-avatar" onclick="location.href='profile.html?uid=${msg.userId}'">${avatarHTML}</div>
        <div class="msg-col">
            ${!isOwn ? `<div class="msg-username" onclick="location.href='profile.html?uid=${msg.userId}'">${msg.username || 'مجهول'}</div>` : ''}
            <div class="msg-bubble">
                <div class="msg-actions-hover">
                    <div class="emoji-picker" id="ep-${key}">
                        ${REACT_EMOJIS.map(e=>`<span class="emoji-opt" data-emoji="${e}" data-key="${key}">${e}</span>`).join('')}
                    </div>
                    <button class="act-btn react-btn" data-key="${key}" title="تفاعل">😊</button>
                    <button class="act-btn reply-btn" data-key="${key}" title="رد">↩️</button>
                    ${isOwn ? `
                        <button class="act-btn edit-btn" data-key="${key}" title="تعديل">✏️</button>
                        <button class="act-btn del-btn"  data-key="${key}" title="حذف">🗑️</button>
                    ` : ''}
                </div>
                ${replyHTML}
                <span class="bubble-text">${escapeHTML(msg.text || '')}</span>
                ${editedHTML}
            </div>
            <div class="msg-reactions">${reactionsHTML}</div>
            <div class="msg-meta">
                <span class="msg-time">${time}</span>
                ${isOwn ? '<span class="msg-read">✓✓</span>' : ''}
            </div>
        </div>
    `;
}

function buildReactionsHTML(reactions, key) {
    if (!reactions || !Object.keys(reactions).length) return '';
    const counts = {};
    const myReacts = new Set();
    Object.entries(reactions).forEach(([uid, emoji]) => {
        counts[emoji] = (counts[emoji]||0) + 1;
        if (uid === currentUser?.uid) myReacts.add(emoji);
    });
    return Object.entries(counts).map(([emoji, count]) =>
        `<span class="reaction-pill ${myReacts.has(emoji)?'mine':''}" data-emoji="${emoji}" data-key="${key}">
            ${emoji} <span class="rp-count">${count}</span>
        </span>`
    ).join('');
}


/* ============================================================
   Attach Actions
   ============================================================ */

function attachActions(el, msg, key, isOwn) {
    // React button
    el.querySelector('.react-btn')?.addEventListener('click', e => {
        e.stopPropagation();
        const picker = document.getElementById(`ep-${key}`);
        if (picker) picker.classList.toggle('show');
    });

    // Emoji options
    el.querySelectorAll('.emoji-opt').forEach(opt => {
        opt.addEventListener('click', async e => {
            e.stopPropagation();
            await toggleReaction(key, opt.dataset.emoji);
            document.getElementById(`ep-${key}`)?.classList.remove('show');
        });
    });

    // Reaction pills (click to toggle)
    el.querySelector('.msg-reactions')?.addEventListener('click', async e => {
        const pill = e.target.closest('.reaction-pill');
        if (pill) await toggleReaction(pill.dataset.key, pill.dataset.emoji);
    });

    // Reply
    el.querySelector('.reply-btn')?.addEventListener('click', () => {
        replyTo = { key, username: msg.username, text: msg.text };
        replyBar.style.display = 'flex';
        replyText.innerHTML = `<strong>${msg.username}</strong>: ${escapeHTML(msg.text||'').slice(0,60)}`;
        msgInput.focus();
    });

    // Edit
    el.querySelector('.edit-btn')?.addEventListener('click', () => {
        editingKey   = key;
        msgInput.value = msg.text || '';
        msgInput.focus();
        msgInput.style.borderColor = 'var(--secondary)';
        msgInput.placeholder = '✏️ جارٍ التعديل...';
        autoResize();
    });

    // Delete
    el.querySelector('.del-btn')?.addEventListener('click', async () => {
        if (!confirm('حذف هذه الرسالة؟')) return;
        await remove(ref(db, `chat/${key}`));
        el.style.cssText += 'opacity:0;transform:scale(0.9);transition:0.3s';
        setTimeout(() => el.remove(), 300);
    });

    // Close emoji picker on outside click
    document.addEventListener('click', e => {
        if (!e.target.closest(`#ep-${key}`) && !e.target.closest('.react-btn'))
            document.getElementById(`ep-${key}`)?.classList.remove('show');
    }, { once: false });
}

async function toggleReaction(key, emoji) {
    if (!currentUser) return;
    const reactRef = ref(db, `chat/${key}/reactions/${currentUser.uid}`);
    const snap = await get(reactRef);
    if (snap.exists() && snap.val() === emoji) {
        await remove(reactRef); // إلغاء التفاعل
    } else {
        await set(reactRef, emoji);
    }
}


/* ============================================================
   Send Message
   ============================================================ */

async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !currentUser) return;

    sendBtn.disabled = true;

    if (editingKey) {
        // تعديل رسالة
        await update(ref(db, `chat/${editingKey}`), { text, edited: true });
        editingKey = null;
        msgInput.style.borderColor = '';
        msgInput.placeholder = 'اكتب رسالتك...';
    } else {
        // رسالة جديدة
        const data = {
            userId:    currentUser.uid,
            username:  currentUser.email.split('@')[0],
            text,
            timestamp: Date.now(),
        };
        if (replyTo) {
            data.replyTo = { key: replyTo.key, username: replyTo.username, text: replyTo.text };
            replyTo = null;
            replyBar.style.display = 'none';
        }
        await push(ref(db, 'chat'), data);
    }

    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = false;
    msgInput.focus();
    clearTyping();
    scrollToBottom();
}

sendBtn.onclick = sendMessage;

msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function cancelReply() {
    replyTo = null;
    replyBar.style.display = 'none';
}

window.cancelReply = cancelReply;


/* ============================================================
   Auto Resize Textarea
   ============================================================ */

function autoResize() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
}

msgInput.addEventListener('input', () => {
    autoResize();
    handleTyping();
});


/* ============================================================
   Typing Indicator
   ============================================================ */

function handleTyping() {
    if (!currentUser) return;
    set(ref(db, `typing/${currentUser.uid}`), { name: currentUser.email.split('@')[0], ts: Date.now() });
    clearTimeout(typingTimer);
    typingTimer = setTimeout(clearTyping, 3000);
}

function clearTyping() {
    if (!currentUser) return;
    remove(ref(db, `typing/${currentUser.uid}`));
}

function trackTyping(user) {
    onValue(ref(db, 'typing'), snap => {
        if (!snap.exists()) { typingBar.innerHTML=''; return; }
        const typers = Object.entries(snap.val())
            .filter(([uid, d]) => uid !== user.uid && Date.now() - d.ts < 4000)
            .map(([,d]) => d.name);
        if (!typers.length) { typingBar.innerHTML=''; return; }
        typingBar.innerHTML = `
            <div class="typing-dots"><span></span><span></span><span></span></div>
            <span>${typers.join('، ')} ${typers.length===1?'يكتب...':'يكتبون...'}</span>
        `;
    });
}


/* ============================================================
   Online Presence
   ============================================================ */

function trackPresence(user) {
    const presRef = ref(db, `presence/${user.uid}`);
    set(presRef, { online: true, ts: Date.now(), name: user.email.split('@')[0] });

    onValue(ref(db, 'presence'), snap => {
        if (!snap.exists()) { document.getElementById('onlineCount').innerText = '0'; return; }
        const online = Object.values(snap.val()).filter(p => p.online && Date.now() - p.ts < 60000).length;
        document.getElementById('onlineCount').innerText = online;
    });
}


/* ============================================================
   Scroll
   ============================================================ */

function scrollToBottom() {
    chatBox.scrollTop = chatBox.scrollHeight;
    scrollBtn.classList.remove('show');
    atBottom = true;
}

window.scrollToBottom = scrollToBottom;

chatBox.addEventListener('scroll', () => {
    const threshold = 120;
    atBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < threshold;
    if (atBottom) scrollBtn.classList.remove('show');
});


/* ============================================================
   Helpers
   ============================================================ */

function escapeHTML(str) {
    return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

</script>
</body>
</html>
