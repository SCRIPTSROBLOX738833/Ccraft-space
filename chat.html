<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات cCraft space</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>شات cCraft space</header>
<div id="chatContainer" style="max-height:400px; overflow:auto; padding:1rem; background:#161b22; border-radius:10px;"></div>
<form id="messageForm">
  <input type="text" id="messageInput" placeholder="اكتب رسالتك..." required autocomplete="off" />
  <button type="submit" id="sendBtn">ارسال</button>
</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, get, set } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
    authDomain: "ccraft-space-scripts.firebaseapp.com",
    databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
    projectId: "ccraft-space-scripts",
    storageBucket: "ccraft-space-scripts.firebasestorage.app",
    messagingSenderId: "816078027492",
    appId: "1:816078027492:web:6472cce474078fd4d90af1",
    measurementId: "G-MHDM7YYYBN"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth();

const chatContainer = document.getElementById("chatContainer");
const messageForm = document.getElementById("messageForm");
const messageInput = document.getElementById("messageInput");

let currentUserId = localStorage.getItem("currentUser");
if(!currentUserId) window.location.href="login.html";

// جلب اسم المستخدم أو إضافته إذا جديد
async function getCurrentUserName() {
    const snap = await get(ref(db, `users/${currentUserId}`));
    if(!snap.exists()){
        // أضف المستخدم تلقائيًا
        const email = prompt("اكتب بريدك للتسجيل"); // أو خليه متوفر من صفحة التسجيل
        await set(ref(db, `users/${currentUserId}`), { email });
        return email.split("@")[0];
    }
    return snap.val().email.split("@")[0];
}

// تحميل الرسائل مباشرة
const chatRef = ref(db, "chat");
onChildAdded(chatRef, (snapshot) => {
  const msg = snapshot.val();
  const div = document.createElement("div");
  div.style.background="#0d1117";
  div.style.color="#c9d1d9";
  div.style.padding="8px";
  div.style.borderRadius="8px";
  div.style.marginBottom="4px";
  div.innerText = `${msg.username}: ${msg.text}`;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
});

// إرسال الرسائل
messageForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = messageInput.value.trim();
  if(!text) return;
  const username = await getCurrentUserName();
  push(chatRef, { userId: currentUserId, username, text })
    .then(()=>{ messageInput.value=""; messageInput.focus(); })
    .catch(()=>alert("حدث خطأ، حاول مرة أخرى"));
});
</script>
</body>
</html>
