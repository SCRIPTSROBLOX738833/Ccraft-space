<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات cCraft space</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>شات cCraft space</header>
<div id="chatContainer" style="max-height:400px; overflow:auto; border:1px solid #ccc; padding:1rem;"></div>

<form id="messageForm">
  <input type="text" id="messageInput" placeholder="اكتب رسالتك..." required autocomplete="off" />
  <button type="submit">ارسال</button>
</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

// إعداد Firebase
const firebaseConfig = {
    apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
    authDomain: "ccraft-space-scripts.firebaseapp.com",
    databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
    projectId: "ccraft-space-scripts",
    storageBucket: "ccraft-space-scripts.firebasestorage.app",
    messagingSenderId: "816078027492",
    appId: "1:816078027492:web:6472cce474078fd4d90af1",
    measurementId: "G-MHDM7YYYBN"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const chatContainer = document.getElementById("chatContainer");
const messageForm = document.getElementById("messageForm");
const messageInput = document.getElementById("messageInput");

let currentUser = null;

// تحقق حالة تسجيل الدخول
onAuthStateChanged(auth, user => {
    if (!user) {
        alert("يجب تسجيل الدخول أولاً");
        window.location.href = "login.html";
        return;
    }
    currentUser = user;
    loadChat();
});

// تحميل الشات
function loadChat(){
    const chatRef = ref(db, "chat");
    onChildAdded(chatRef, snapshot => {
        const msg = snapshot.val();
        const div = document.createElement("div");
        div.innerText = `${msg.username}: ${msg.text}`;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    });
}

// إرسال رسالة
messageForm.addEventListener("submit", async e => {
    e.preventDefault();
    const text = messageInput.value.trim();
    if(!text) return;

    const chatRef = ref(db, "chat");
    await push(chatRef, {
        userId: currentUser.uid,
        username: currentUser.email.split("@")[0],
        text
    });

    messageInput.value = "";
    messageInput.focus();
});
</script>
</body>
</html>
