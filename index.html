<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9131038282158705"
     crossorigin="anonymous"></script>
    <title>CCRAFT SPACE | الرئيسية</title>

    <link rel="icon" type="image/jpeg" href="cCraft.jpg">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

    <style>

        /* ============================================================
           Header — الرئيسية فقط (مختلف عن باقي الصفحات)
           ============================================================ */

        header {
            background: transparent;
            backdrop-filter: none;
            border-bottom: none;
            position: static;

            padding: 3rem 1rem 1.5rem;
            margin-bottom: 0;
            text-align: center;
        }


        /* ============================================================
           Logo
           ============================================================ */

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 2.5rem;
        }

        .logo-wrapper::after {
            content: '';
            position: absolute;
            inset: -10px;
            background: var(--accent-gradient);
            filter: blur(28px);
            opacity: 0.28;
            border-radius: 50%;
            z-index: -1;
        }

        .site-logo {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 3px solid var(--border-color);
            object-fit: cover;
            transition: var(--transition);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.6);
            display: block;
        }

        .site-logo:hover {
            transform: scale(1.06) rotate(2deg);
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
        }


        /* ============================================================
           Nav — شبكة أزرار الرئيسية
           ============================================================ */

        nav {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 95%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 28px;
            border-radius: 28px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);

            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .nav-button {
            position: relative;
            font-family: 'Tajawal', sans-serif;
            font-weight: 800;
            font-size: 0.95rem;
            padding: 14px 22px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-main);
            min-width: 150px;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            text-decoration: none;
        }

        /* shimmer effect */
        .nav-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transition: 0.5s;
        }

        .nav-button:hover::before {
            left: 100%;
        }

        .nav-button:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.2);
            filter: none;
        }

        .nav-button:active {
            transform: scale(0.96);
        }

        /* ألوان تمييز كل زر */
        #rank-btn  { border-bottom: 3px solid #6e40aa; }
        #nova-btn  { border-bottom: 3px solid var(--secondary); }
        #pub-btn   { border-bottom: 3px solid #ff7f50; }
        #view-btn  { border-bottom: 3px solid #818cf8; }
        #hacks-btn { border-bottom: 3px solid #4ade80; }
        #help-btn  { border-bottom: 3px solid var(--text-muted); }
        #chat-btn  { border-bottom: 3px solid #f472b6; }


        /* ============================================================
           Main — Hero
           ============================================================ */

        main {
            max-width: 700px;
            margin: 4.5rem auto;
            padding: 0 2rem;
            text-align: center;

            background: transparent !important;
            box-shadow: none !important;
            animation: fadeIn 0.6s ease both;
        }

        main h2 {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.2rem;
            line-height: 1.3;
        }

        main p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.8;
            max-width: 560px;
            margin: 0 auto;
        }


        /* ============================================================
           Footer
           ============================================================ */

        footer {
            text-align: center;
            padding: 3rem 1rem;
            color: #3a3a4a;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            border-top: 1px solid var(--border-color);
            margin-top: 2rem;
        }


        /* ============================================================
           Responsive
           ============================================================ */

        @media (max-width: 768px) {

            nav {
                flex-direction: column;
                gap: 10px;
                padding: 18px;
            }

            .nav-button {
                width: 100%;
                min-width: unset;
            }

            .site-logo {
                width: 130px;
                height: 130px;
            }

        }

    </style>
</head>
<body>

    <header>

        <div class="logo-wrapper">
            <img src="cCraft.jpg" alt="CCRAFT SPACE" class="site-logo">
        </div>

        <nav>
            <button id="rank-btn"  class="nav-button" onclick="location.href='login.html'">👤 حسابي</button>
            <button class="nav-button" onclick="location.href='profile.html'">👤 بروفايلي</button>
            <button id="nova-btn"  class="nav-button" onclick="location.href='nova.html'">🤖 NOVA AI</button>
            <button class="nav-button" onclick="location.href='leaderboard.html'">🏆 ليدربورد</button>
            <button id="pub-btn"   class="nav-button" onclick="location.href='publish.html'">📤 نشر سكربت</button>
            <button id="view-btn"  class="nav-button" onclick="location.href='scripts.html'">📜 السكربتات</button>
            <button id="hacks-btn" class="nav-button" onclick="location.href='hacks.html'">⚡ هاكات</button>
            <button id="help-btn"  class="nav-button" onclick="location.href='help.html'">🛠️ الدعم</button>
            <button id="chat-btn"  class="nav-button" onclick="location.href='chat.html'">💬 شات</button>
        </nav>

    </header>

    <main>
        <h2>مرحباً بك في CCRAFT SPACE</h2>
     
    </main>

    <footer>
        © CCRAFT SPACE 2026 — جـميع الحـقوق محـفوظة
    </footer>

</body>
</html>
