<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCRAFT SPACE</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body {font-family: Arial, sans-serif; margin:0; background:#111; color:#eee;}
    nav {background:#1b1b2f; padding:1rem; display:flex; justify-content:space-between; align-items:center;}
    nav .logo {font-size:1.5rem; font-weight:bold; color:#4a7bff;}
    nav .menu a {margin-left:1rem; color:#eee; text-decoration:none;}
    nav .menu a:hover {color:#4a7bff;}
    .container {max-width:1000px; margin:2rem auto; padding:0 1rem;}
    h1 {text-align:center; margin-bottom:1rem;}
    .buttons {display:flex; justify-content:center; gap:1rem; flex-wrap:wrap; margin-bottom:2rem;}
    .buttons button {padding:0.8rem 1.2rem; font-size:1rem; border:none; border-radius:6px; cursor:pointer; background:#4a7bff; color:#fff; transition:0.2s;}
    .buttons button:hover {background:#1f54d0;}
    .form-group {margin-bottom:1rem; display:flex; flex-direction:column;}
    .form-group input, .form-group textarea, .form-group select {padding:0.6rem; border-radius:6px; border:1px solid #444; background:#222; color:#eee;}
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {outline:none; border-color:#4a7bff;}
    .scripts-list {display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:1rem;}
    .script-card {background:#1b1b2f; padding:1rem; border-radius:8px;}
    .script-card img {width:100%; border-radius:6px; margin-bottom:0.5rem;}
    .script-card h3 {margin:0 0 0.5rem 0;}
    .script-card p {font-size:0.9rem;}
    .hidden {display:none;}
    button.copy-btn {margin-top:0.5rem; background:#222; color:#4a7bff;}
</style>
<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-database.js";const firebaseConfig = { apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4", authDomain: "ccraft-space-scripts.firebaseapp.com", projectId: "ccraft-space-scripts", storageBucket: "ccraft-space-scripts.firebasestorage.app", messagingSenderId: "816078027492", appId: "1:816078027492:web:6472cce474078fd4d90af1", measurementId: "G-MHDM7YYYBN" };

const app = initializeApp(firebaseConfig); const db = getDatabase(app);

window.addScript = function(e){ e.preventDefault(); const title = document.getElementById('scriptTitle').value; const desc = document.getElementById('scriptDesc').value; const code = document.getElementById('scriptCode').value; const category = document.getElementById('category').value; if(!title||!desc||!code||!category){alert('اكمل كل الحقول'); return;} push(ref(db,'scripts'), {title, desc, code, category, date:new Date().toISOString()}); alert('تم نشر السكربت!'); document.getElementById('publishForm').reset(); };

window.loadScripts = function(){ const container = document.getElementById('scriptsContainer'); container.innerHTML=''; onValue(ref(db,'scripts'), snapshot=>{ const data = snapshot.val(); if(data){ Object.values(data).forEach(s=>{ const div = document.createElement('div'); div.className='script-card'; div.innerHTML=<img src='https://via.placeholder.com/250x120'><h3>${s.title}</h3><p>${s.desc}</p><pre>${s.code}</pre><small>${s.category}</small>; container.appendChild(div); }); } }); }; </script>

</head>
<body>
<nav>
<div class="logo">CCRAFT SPACE</div>
<div class="menu">
<a href="#home">الرئيسية</a>
<a href="#publish">نشر سكربتات</a>
<a href="#scripts">السكربتات</a>
<a href="#hacks">هاكات</a>
</div>
</nav>
<div class="container" id="home">
<h1>أهلا بك في CCRAFT SPACE</h1>
<div class="buttons">
<button onclick="document.getElementById('publish').scrollIntoView()">نشر سكربت</button>
<button onclick="document.getElementById('scripts').scrollIntoView(); loadScripts()">عرض السكربتات</button>
<button onclick="alert('CCRAFT SPACE!')">CCRAFT SPACE</button>
<button onclick="alert('هاكات')">هاكات</button>
</div><!-- Publish Form --><div id="publish">
<h2>نشر سكربت جديد</h2>
<form id="publishForm" onsubmit="addScript(event)">
<div class="form-group"><label>عنوان السكربت</label><input id="scriptTitle" required></div>
<div class="form-group"><label>وصف السكربت</label><textarea id="scriptDesc" required></textarea></div>
<div class="form-group"><label>الكود</label><textarea id="scriptCode" required></textarea></div>
<div class="form-group"><label>الفئة</label><select id="category" required><option value="">اختار</option><option>Game Scripts</option><option>Admin Scripts</option><option>Effects</option><option>Data</option><option>AI</option><option>Utilities</option></select></div>
<button type="submit">نشر</button>
</form>
</div><!-- Scripts List --><div id="scripts">
<h2>السكربتات المنشورة</h2>
<div class="scripts-list" id="scriptsContainer"></div>
</div></div>
</body>
</html>
