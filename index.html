<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCRAFT SPACE | الرئيسية</title>
    
    <link rel="icon" type="image/jpeg" href="cCraft.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ==================================
           1. الأساسيات والمتغيرات (The Core)
           ================================== */
        :root {
            --bg-base: #030305;
            --bg-surface: #0a0a0f;
            --primary: #8b5cf6; 
            --secondary: #00f2fe; 
            --accent-gradient: linear-gradient(135deg, var(--primary) 0%, #3b82f6 100%);
            --text-main: #f8fafc;
            --text-muted: #8b949e;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(10, 10, 15, 0.7);
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
            line-height: 1.6;
        }

        /* ==================================
           2. الهيدر والشعار (Branding)
           ================================== */
        header {
            padding: 3rem 1rem 1rem;
            text-align: center;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
        }

        /* هالة ضوئية خلف اللوجو */
        .logo-wrapper::after {
            content: '';
            position: absolute;
            inset: -10px;
            background: var(--accent-gradient);
            filter: blur(25px);
            opacity: 0.3;
            border-radius: 50%;
            z-index: -1;
        }

        .site-logo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid var(--border-color);
            object-fit: cover;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .site-logo:hover {
            transform: scale(1.05) rotate(2deg);
            border-color: var(--primary);
        }

        /* ==================================
           3. أزرار التنقل (Premium Grid)
           ================================== */
        nav {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 95%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 25px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            gap: 15px; /* المسافة بين الأزرار */
            flex-wrap: wrap;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .nav-button {
            position: relative;
            font-family: inherit;
            font-weight: 800;
            font-size: 0.95rem;
            padding: 14px 24px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: var(--transition);
            color: white;
            min-width: 160px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
        }

        /* تأثير التوهج الفردي لكل زرار عند الوقوف عليه */
        .nav-button:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.2);
        }

        /* تمييز الأزرار بالألوان */
        #rank-btn { border-bottom: 3px solid #6e40aa; }
        #view-btn { border-bottom: 3px solid var(--secondary); }
        #publish-btn { border-bottom: 3px solid #ff7f50; }
        #hacks-btn { border-bottom: 3px solid #32cd32; }
        #help-btn { border-bottom: 3px solid var(--text-muted); }

        /* حركة الوميض داخل الأزرار */
        .nav-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .nav-button:hover::before { left: 100%; }

        /* ==================================
           4. المحتوى (Hero Section)
           ================================== */
        main {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 2rem;
            text-align: center;
        }

        h2 {
            font-size: 2.5rem;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        footer {
            text-align: center;
            padding: 3rem;
            color: #444;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* ==================================
           5. التجاوب (Responsive)
           ================================== */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 12px;
                padding: 15px;
            }
            .nav-button {
                width: 100%;
            }
            .site-logo {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-wrapper">
            <img src="cCraft.jpg" alt="CCRAFT SPACE" class="site-logo">
        </div>
        
        <nav>
            <button id="rank-btn" class="nav-button" onclick="location.href='login.html'">👤 حسابي</button>
            <button id="view-btn" class="nav-button" onclick="location.href='nova.html'">🤖 NOVA AI</button>
            <button id="publish-btn" class="nav-button" onclick="location.href='publish.html'">📤 نشر سكربت</button>
            <button id="view-btn" class="nav-button" onclick="location.href='scripts.html'">📜 السكربتات</button>
            <button id="hacks-btn" class="nav-button" onclick="location.href='hacks.html'">⚡ هاكات</button>
            <button id="help-btn" class="nav-button" onclick="location.href='help.html'">🛠️ الدعم</button>
            <button id="rank-btn" class="nav-button" onclick="location.href='chat.html'">💬 شات</button>
        </nav>
    </header>

    <main>
        <h2>مرحباً بك في CCRAFT SPACE</h2>
        <p>مستقبلك في عالم البرمجة وروبلوكس يبدأ من هنا. منصة متطورة، سريعة، وآمنة.</p>
    </main>

    <footer>
        © CCRAFT SPACE 2026 - جـميع الحـقوق محـفوظة
    </footer>

</body>
</html>
