<title>CCRAFT SPACE | سكربتات Roblox</title>
<link rel="stylesheet" href="styles.css">
<style>
  .star { cursor:pointer; font-size:20px; color:#3a3a4a; margin-right:2px; transition: color 0.2s, transform 0.2s; }
  .star:hover { transform: scale(1.2); color: gold; }

  /* Map badge على الكارد */
  .map-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(0, 242, 254, 0.08);
    border: 1px solid rgba(0, 242, 254, 0.2);

    padding: 3px 10px;
    border-radius: 50px;

  }

  .no-map-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-color);
    color: var(--text-muted);

    font-weight: 700;
    padding: 3px 10px;
    border-radius: 50px;
    margin-bottom: 10px;
  }

<body>

<header>
  <button onclick="location.href='publish.html'">📤 نشر سكربت</button>
  <button class="nav-button" onclick="location.href='index.html'">رجوع للصفحة الرئيسية</button>
</header>

<main>
    <p>عدد السكربتات في الموقع: <span id="scriptCount">جارٍ التحميل...</span></p>
    <h1>قائمة السكربتات</h1>

    <input type="text" id="searchScripts" placeholder="🔍 ابحث عن سكربت أو قسم أو ماب...">
    <button id="searchButton">بحث</button>

    <div id="scriptsList"></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
  authDomain: "ccraft-space-scripts.firebaseapp.com",
  databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
  projectId: "ccraft-space-scripts",
  storageBucket: "ccraft-space-scripts.firebasestorage.app",
  messagingSenderId: "816078027492",
  appId: "1:816078027492:web:6472cce474078fd4d90af1",
  measurementId: "G-MHDM7YYYBN"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

window.copyScript = (id) => {
  const codeEl = document.getElementById(`code-${id}`);
  if (!codeEl) return alert("خطأ في السكربت");
  navigator.clipboard.writeText(codeEl.innerText)
    .then(() => alert("تم نسخ السكربت!"))
    .catch(() => alert("حدث خطأ أثناء النسخ"));
};

function updateURLQuery(query) {
  const url = new URL(window.location);
  if (query) url.searchParams.set('search', query);
  else url.searchParams.delete('search');
  window.history.replaceState(null, '', url);
}

function getSearchQuery() {
  const params = new URLSearchParams(window.location.search);
  return params.get('search') ? params.get('search').toLowerCase().trim() : '';
}

function mapBadgeHTML(map) {
  if (!map) return `<span class="no-map-badge">🌐 ليس لماب محدد</span>`;
  return `<span class="map-badge">🗺️ ${map}</span>`;
}

async function loadScripts() {
  const list = document.getElementById('scriptsList');
  list.innerHTML = '';
  const snapshot = await get(ref(db, 'scripts'));
  const scriptsData = snapshot.exists() ? snapshot.val() : {};

  document.getElementById('scriptCount').innerText = Object.keys(scriptsData).length;

  const query = getSearchQuery();
  let anyMatch = false;

  // تحويل الكائن إلى مصفوفة لتمكين الترتيب
  const scriptsArray = Object.keys(scriptsData).map(id => ({
    id: id,
    ...scriptsData[id]
  }));

  // ترتيب السكربتات: الأحدث أولاً (تنازلياً)
  // ملاحظة: إذا كان لديك حقل timestamp يفضل استخدامه، وإلا سنعتمد على ترتيب المفاتيح التلقائي لـ Firebase
  scriptsArray.reverse(); 

  for (const s of scriptsArray) {
    const id = s.id;
    const title    = (s.title    || '').toLowerCase();
    const category = (s.category || '').toLowerCase();
    const map      = (s.map      || '').toLowerCase();

    const match = !query ||
        title.includes(query) ||
        category.includes(query) ||
        map.includes(query);

    const div = document.createElement('div');
    div.className = 'script-card';
    div.dataset.id = id;
    div.innerHTML = `
      <h3>${s.title}</h3>
      ${mapBadgeHTML(s.map)}
      <p>📁 ${s.category}</p>
      <pre id="code-${id}">${s.code}</pre>
      <button onclick="copyScript('${id}')">نسخ السكربت</button>
      <button onclick="location.href='script.html?id=${id}'">عرض السكربت</button>
      <button class="like-btn" data-id="${id}">👍 Like (<span class="like-count">${s.likes || 0}</span>)</button>
      <div class="rating" data-id="${id}">
        ${[1,2,3,4,5].map(n => `<span class="star" data-value="${n}">&#9733;</span>`).join('')}
        <span class="avg-rating">(${s.votes ? (s.rating / s.votes).toFixed(1) : 0})</span>
      </div>
    `;
    div.style.display = match ? "block" : "none";
    if (match) anyMatch = true;
    list.appendChild(div);
  }

  if (!anyMatch) {
    const p = document.createElement('p');
    p.id = 'noMatchMsg';
    p.innerText = 'لا توجد سكربتات مطابقة.';
    p.style.color = 'var(--danger)';
    list.appendChild(p);
  }

  // لايك
  document.querySelectorAll('.like-btn').forEach(btn => {
    const scriptId = btn.dataset.id;
    if (localStorage.getItem(`liked_${scriptId}`)) {
      btn.disabled = true;
      btn.style.opacity = 0.6;
    }
    btn.addEventListener('click', async () => {
      if (localStorage.getItem(`liked_${scriptId}`)) return;
      const likeRef = ref(db, `scripts/${scriptId}/likes`);
      const snap = await get(likeRef);
      let likes = snap.exists() ? snap.val() : 0;
      likes++;
      await set(likeRef, likes);
      btn.querySelector('.like-count').innerText = likes;
      localStorage.setItem(`liked_${scriptId}`, 'true');
      btn.disabled = true;
      btn.style.opacity = 0.6;
    });
  });

  // تقييم
  document.querySelectorAll('.rating').forEach(async div => {
    const scriptId = div.dataset.id;
    const stars = div.querySelectorAll('.star');
    const avgEl = div.querySelector('.avg-rating');

    const snap = await get(ref(db, `scripts/${scriptId}`));
    if (snap.exists()) {
      const data = snap.val();
      const avg  = data.votes ? data.rating / data.votes : 0;
      stars.forEach((star, idx) => { star.style.color = (idx+1) <= avg ? 'gold' : '#3a3a4a'; });
      avgEl.innerText = `(${avg.toFixed(1)})`;
    }

    stars.forEach(star => {
      star.addEventListener('click', async () => {
        if (localStorage.getItem(`rated_${scriptId}`)) return;
        const value = Number(star.dataset.value);
        const ratingRef = ref(db, `scripts/${scriptId}`);
        const snap  = await get(ratingRef);
        let rating  = snap.exists() ? snap.val().rating || 0 : 0;
        let votes   = snap.exists() ? snap.val().votes  || 0 : 0;
        rating += value; votes++;
        await set(ratingRef, { ...snap.val(), rating, votes });
        localStorage.setItem(`rated_${scriptId}`, 'true');
        const avg = rating / votes;
        stars.forEach((s, idx) => { s.style.color = (idx+1) <= avg ? 'gold' : '#3a3a4a'; });
        avgEl.innerText = `(${avg.toFixed(1)})`;
      });
    });
  });
}

function handleSearch() {
  updateURLQuery(document.getElementById('searchScripts').value.toLowerCase().trim());
  loadScripts();
}

window.addEventListener('DOMContentLoaded', () => {
  const searchInput = document.getElementById('searchScripts');
  const searchBtn   = document.getElementById('searchButton');
  if (searchInput) searchInput.value = getSearchQuery();
  if (searchInput) searchInput.addEventListener('input', handleSearch);
  if (searchBtn)   searchBtn.addEventListener('click', handleSearch);
  loadScripts();
});
</script>
</body>
