<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قائمة السكربتات</title>
  <link rel="stylesheet" href="styles.css">

  <!-- كود AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9131038282158705"
     crossorigin="anonymous"></script>
</head>
<body>
<header>
  <button onclick="location.href='publish.html'">نشر سكربت</button>
</header>

<main>
  <h1>قائمة السكربتات</h1>

  
  <!-- إعلان -->
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-9131038282158705"
       data-ad-slot="1234567890"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>

  <div id="scriptsList"></div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
    authDomain: "ccraft-space-scripts.firebaseapp.com",
    databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
    projectId: "ccraft-space-scripts",
    storageBucket: "ccraft-space-scripts.firebasestorage.app",
    messagingSenderId: "816078027492",
    appId: "1:816078027492:web:6472cce474078fd4d90af1",
    measurementId: "G-MHDM7YYYBN"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  async function loadScripts() {
    const list = document.getElementById('scriptsList');
    list.innerHTML = '';
    const snapshot = await get(ref(db, 'scripts'));
    if(snapshot.exists()) {
      const scripts = snapshot.val();
      Object.keys(scripts).forEach(id => {
        const s = scripts[id];
        const div = document.createElement('div');
        div.className = 'script-card';
        div.dataset.id = id;
        div.innerHTML = `
          <h3>${s.title}</h3>
          <pre id="code-${id}">${s.code}</pre>
          <p>Category: ${s.category}</p>
          <button onclick="copyScript('${id}')">نسخ السكربت</button>
        `;
        list.appendChild(div);
      });
    } else {
      list.innerHTML = '<p>لا توجد سكربتات حتى الآن.</p>';
    }
  }

  window.copyScript = (id) => {
    const codeEl = document.getElementById(`code-${id}`);
    if (!codeEl) return alert("خطأ في السكربت");
    navigator.clipboard.writeText(codeEl.innerText)
      .then(() => alert("تم نسخ السكربت!"))
      .catch(() => alert("حدث خطأ أثناء النسخ"));
  }

  window.addEventListener('DOMContentLoaded', loadScripts);
</script>
</body>
</html>
