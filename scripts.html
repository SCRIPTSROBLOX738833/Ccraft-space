<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض السكربتات</title>

<style>
body{
font-family:Arial;
background:#0d1117;
color:white;
padding:20px;
}

.script{
background:#161b22;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
padding:8px 14px;
cursor:pointer;
}

#userPoints{
margin-bottom:20px;
font-size:20px;
}
</style>

</head>
<body>

<h1>عرض السكربتات</h1>

<p id="userPoints">🔥 نقاطك: 0</p>
<button class="nav-button" onclick="location.href='ranking.html'">ترتيب المستخدمين </button>

<div id="scriptsContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
  authDomain: "ccraft-space-scripts.firebaseapp.com",
  databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
  projectId: "ccraft-space-scripts",
  storageBucket: "ccraft-space-scripts.firebasestorage.app",
  messagingSenderId: "816078027492",
  appId: "1:816078027492:web:6472cce474078fd4d90af1",
  measurementId: "G-MHDM7YYYBN"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("scriptsContainer");

async function loadPoints() {
  const username = localStorage.getItem("username");

  if (!username) return;

  const snap = await get(ref(db, 'users/' + username));

  if (snap.exists()) {
    document.getElementById("userPoints").innerText =
      `🔥 نقاطك: ${snap.val().points || 0}`;
  }
}

async function loadScripts() {
  const snap = await get(ref(db, 'scripts'));

  if (!snap.exists()) {
    container.innerHTML = "لا يوجد سكربتات";
    return;
  }

  const data = snap.val();

  Object.entries(data).forEach(([id, script]) => {
    const div = document.createElement("div");
    div.className = "script";

    div.innerHTML = `
      <h3>${script.title}</h3>
      <p>الناشر: ${script.username || "غير معروف"}</p>
      <p>القسم: ${script.category || "عام"}</p>
      <button onclick="location.href='script.html?id=${id}'">عرض السكربت</button>
    `;

    container.appendChild(div);
  });
}

loadPoints();
loadScripts();

</script>

</body>
</html>
