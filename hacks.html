<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحميل هاك دلتا</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div style="display:flex;justify-content:center;align-items:center;height:100vh;">
  <div style="border:1px solid black;padding:20px;text-align:center;width:300px;">
    <h2>تحميل هاك دلتا</h2>
    <p>اختر جهازك لتحميل الهاك:</p>
    <button id="androidBtn" disabled>تحميل للأندرويد</button>
    <button id="iosBtn" disabled>تحميل للأيفون</button>
    <p id="status" style="color:red;margin-top:10px;"></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// إعدادات Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
  authDomain: "ccraft-space-scripts.firebaseapp.com",
  databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
  projectId: "ccraft-space-scripts",
  storageBucket: "ccraft-space-scripts.firebasestorage.app",
  messagingSenderId: "816078027492",
  appId: "1:816078027492:web:6472cce474078fd4d90af1",
  measurementId: "G-MHDM7YYYBN"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const androidBtn = document.getElementById("androidBtn");
const iosBtn = document.getElementById("iosBtn");
const statusText = document.getElementById("status");

let androidLink = "";
let iosLink = "";

// جلب الروابط من Firebase مع Debug كامل
statusText.textContent = "جارٍ تحميل الروابط 
  ...";
get(ref(db, "delta"))
  .then(snapshot => {
    console.log("Snapshot data:", snapshot.val());
    if (snapshot.exists()) {
      const data = snapshot.val();
      androidLink = data.android;
      iosLink = data.ios;

      androidBtn.disabled = false;
      iosBtn.disabled = false;

      statusText.style.color = "green";
      statusText.textContent = "تم تحميل الروابط بنجاح. اضغط الزر المناسب.";
    } else {
      statusText.textContent = "Node 'delta' موجود بس فاضي.";
    }
  })
  .catch(error => {
    console.error("Firebase DB Error:", error);
    statusText.textContent = "حدث خطأ أثناء تحميل الروابط. افتح Console لرؤية التفاصيل.";
  });

// التعامل مع الضغط على الأزرار
androidBtn.onclick = () => {
  if (androidLink) window.location.href = androidLink;
  else alert("رابط الأندرويد غير جاهز");
};

iosBtn.onclick = () => {
  if (iosLink) window.location.href = iosLink;
  else alert("رابط الآيفون غير جاهز");
};
</script>

</body>
</html>
