<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
<title>تحميل هاك دلتا</title>
</head>
<body>

<div style="display:flex;justify-content:center;align-items:center;height:100vh;">
  <div style="border:1px solid black;padding:20px;text-align:center;width:300px;">
    <h2>تحميل هاك دلتا</h2>
    <p>اختر جهازك لتحميل الهاك:</p>

    <button id="androidBtn" disabled>تحميل للأندرويد</button>
    <button id="iosBtn" disabled>تحميل للأيفون</button>

    <p id="status">جارٍ تحميل البيانات...</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ضع هنا إعدادات Firebase الخاصة بك
const firebaseConfig = {
  apiKey: "ضع_المفتاح_هنا",
  authDomain: "ضع_المفتاح_هنا.firebaseapp.com",
  databaseURL: "https://ضع_المفتاح_هنا-default-rtdb.firebaseio.com",
  projectId: "ضع_المفتاح_هنا",
  storageBucket: "ضع_المفتاح_هنا.appspot.com",
  messagingSenderId: "ضع_المفتاح_هنا",
  appId: "ضع_المفتاح_هنا"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const androidBtn = document.getElementById("androidBtn");
const iosBtn = document.getElementById("iosBtn");
const statusText = document.getElementById("status");

let androidLink = "";
let iosLink = "";

// جلب الروابط من Firebase
get(ref(db, "delta"))
.then(snapshot => {
  if (snapshot.exists()) {
    const data = snapshot.val();
    androidLink = data.android || "";
    iosLink = data.ios || "";

    if (androidLink) androidBtn.disabled = false;
    if (iosLink) iosBtn.disabled = false;

    statusText.textContent = "جاهز للتحميل";
  } else {
    statusText.textContent = "لا توجد بيانات";
  }
})
.catch(error => {
  console.error(error);
  statusText.textContent = "حدث خطأ: " + error.message;
});

// أحداث الضغط على الأزرار
androidBtn.onclick = () => {
  if (androidLink) window.location.href = androidLink;
};
iosBtn.onclick = () => {
  if (iosLink) window.location.href = iosLink;
};
</script>

</body>
</html>
