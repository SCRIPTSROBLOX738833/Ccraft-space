<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
<title>تحميل هاك دلتا</title>
</head>
<body>

<div style="display:flex;justify-content:center;align-items:center;height:100vh;">
  <div style="border:1px solid black;padding:20px;text-align:center;width:300px;">
    <h2>تحميل هاك دلتا</h2>
    <p>اختر جهازك لتحميل الهاك:</p>

    <button id="androidBtn" disabled>تحميل للأندرويد</button>
    <button id="iosBtn" disabled>تحميل للأيفون</button>

    <p id="status"></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// إعدادات Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
  authDomain: "ccraft-space-scripts.firebaseapp.com",
  databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
  projectId: "ccraft-space-scripts",
  storageBucket: "ccraft-space-scripts.firebasestorage.app",
  messagingSenderId: "816078027492",
  appId: "1:816078027492:web:6472cce474078fd4d90af1",
  measurementId: "G-MHDM7YYYBN"
};

// تهيئة Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const androidBtn = document.getElementById("androidBtn");
const iosBtn = document.getElementById("iosBtn");
const statusText = document.getElementById("status");

let androidLink = "";
let iosLink = "";

// جلب روابط التحميل من Firebase
get(ref(db, "delta?t=" + Date.now()))
  .then(snapshot => {
    if (snapshot.exists()) {
      const data = snapshot.val();
      androidLink = data.android || "";
      iosLink = data.ios || "";
      if (androidLink) androidBtn.disabled = false;
      if (iosLink) iosBtn.disabled = false;
    } else {
      statusText.textContent = "لا توجد بيانات";
    }
  })
  .catch(error => {
    console.error(error);
    statusText.textContent = "حدث خطأ";
  });

// التعامل مع الضغط على الأزرار
androidBtn.onclick = () => { if (androidLink) window.location.href = androidLink; };
iosBtn.onclick = () => { if (iosLink) window.location.href = iosLink; };
</script>

</body>
</html>
