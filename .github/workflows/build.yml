name: Build static scripts page

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate static scripts snapshot
        run: node generate-static.js

      - name: Commit updated scripts.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts.html
          git diff --staged --quiet || git commit -m "Auto: update static scripts snapshot"
          git push
