<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نشر سكربت - CCRAFT SPACE</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <button onclick="location.href='scripts.html'">عرض السكربتات</button>
  <button onclick="location.href='publish.html'">نشر سكربت</button>
</header>

<main>
  <h1>نشر سكربت جديد</h1>
  <form id="publishForm">
    <label>عنوان السكربت</label>
    <input type="text" id="scriptTitle" required>

    <label>كود السكربت</label>
    <textarea id="scriptCode" rows="6" required></textarea>

    <label>الفئة</label>
    <select id="category" required>
      <option value="">اختر الفئة</option>
      <option value="game-scripts">Game Scripts</option>
      <option value="admin">Admin Scripts</option>
      <option value="effects">Effects & Tools</option>
      <option value="data">Data & Systems</option>
      <option value="ai">سكربتات هكر</option>
      <option value="utilities">Utilities</option>
    </select>

    <button type="button" onclick="publishScript()">نشر السكربت</button>
  </form>
</main>

<script type="module" src="firebase-scripts.js"></script>
</body>
</html>
