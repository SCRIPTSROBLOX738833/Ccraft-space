<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نشر سكربت</title>
  <link rel="stylesheet" href="styles.css">

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9131038282158705"
     crossorigin="anonymous"></script>
</head>
<body>
<header>
  <button onclick="location.href='scripts.html'">قائمة السكربتات</button>
</header>

<main>
  <h1>نشر سكربت جديد</h1>

  <!-- إعلان -->
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-9131038282158705"
       data-ad-slot="1234567890"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>

  <form id="publishForm">
    <input type="text" id="scriptTitle" placeholder="عنوان السكربت" required>
    <textarea id="scriptCode" placeholder="كود السكربت هنا" rows="6" required></textarea>
    <select id="category" required>
      <option value="">اختر القسم</option>
      <option value="game">Game Scripts</option>
      <option value="admin">Admin Scripts</option>
      <option value="Delta">سكربت دلتا</option>
    </select>
    <input type="text" id="tags" placeholder="أدخل الوسوم مفصولة بفاصلة">
    <button type="submit">نشر السكربت</button>
  </form>
</main>

<!-- Firebase Config + Publish JS -->
<script type="module" src="firebase-config.js"></script>
<script type="module" src="publish.js"></script>
</body>
  </html>
