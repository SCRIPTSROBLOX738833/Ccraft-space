<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نشر سكربت</title>
</head>
<body>

<h2>نشر سكربت</h2>

<p id="userPoints">🔥 نقاطك: 0</p>

<input type="text" id="scriptTitle" placeholder="عنوان السكربت"><br><br>
<textarea id="scriptCode" placeholder="اكتب السكربت"></textarea><br><br>
<input type="text" id="category" placeholder="القسم"><br><br>

<button onclick="publishScript()">نشر السكربت</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, push, set, get, update } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function loadPoints() {
  const username = localStorage.getItem("username");
  if (!username) return;

  const snap = await get(ref(db, 'users/' + username));

  if (snap.exists()) {
    document.getElementById("userPoints").innerText =
      `🔥 نقاطك: ${snap.val().points || 0}`;
  }
}

window.publishScript = async function() {
  let username = localStorage.getItem("username");

  if (!username) {
    username = prompt("اكتب اسمك");
    if (!username) return;
    localStorage.setItem("username", username);
  }

  const title = document.getElementById("scriptTitle").value;
  const code = document.getElementById("scriptCode").value;
  const category = document.getElementById("category").value;

  const newRef = push(ref(db, 'scripts'));

  await set(newRef, {
    title,
    code,
    category,
    username
  });

  const userRef = ref(db, 'users/' + username);
  const snap = await get(userRef);

  if (snap.exists()) {
    const data = snap.val();

    await update(userRef, {
      points: (data.points || 0) + 5,
      scripts: (data.scripts || 0) + 1
    });

  } else {
    await set(userRef, {
      name: username,
      points: 5,
      scripts: 1
    });
  }

  alert("تم النشر +5 نقاط");
  loadPoints();
};

loadPoints();
</script>

</body>
</html>
