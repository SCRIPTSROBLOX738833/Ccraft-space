<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نشر سكربت</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <button onclick="location.href='scripts.html'">قائمة السكربتات</button>
</header>

<main>
<h1>نشر سكربت جديد</h1>

<form id="publishForm" onsubmit="publishScript(event)">
  <input type="text" id="scriptTitle" placeholder="عنوان السكربت" required>
  <textarea id="scriptCode" placeholder="كود السكربت هنا" rows="6" required></textarea>
  <select id="category" required>
    <option value="">اختر القسم</option>
    <option value="game">Game Scripts</option>
    <option value="admin">Admin Scripts</option>
    <option value="Delta">سكربت دلتا</option>
  </select>
  <input type="text" id="tags" placeholder="أدخل الوسوم مفصولة بفاصلة">
  <button type="button" onclick="publishScript()">نشر السكربت</button>
</form>
</main>

<script type="module">
import { db } from "./firebase-config.js";
import { ref, push, set } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";

window.publishScript = async function() {
  const title = document.getElementById("scriptTitle").value;
  const code = document.getElementById("scriptCode").value;
  const category = document.getElementById("category").value;
  const tags = document.getElementById("tags").value.split(",").map(t => t.trim());

  try {
    const newScriptRef = push(ref(db, "scripts"));
    await set(newScriptRef, { title, code, category, tags, createdAt: Date.now() });
    alert("تم نشر السكربت بنجاح!");
    document.getElementById("scriptTitle").value = "";
    document.getElementById("scriptCode").value = "";
    document.getElementById("category").value = "";
    document.getElementById("tags").value = "";
  } catch (err) {
    console.error(err);
    alert("فشل النشر، تحقق من إعدادات ");
  }
};
</script>
</body>
    </html>
