<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض السكربت</title>
<style>
  body{background:#0d1117;color:#c9d1d9;font-family:sans-serif;margin:0;padding:1rem;}
  pre{background:#161b22;padding:1rem;border-radius:8px;overflow:auto;}
  button{padding:.5rem 1rem;border:none;border-radius:6px;background:#58a6ff;color:#0d1117;cursor:pointer;margin-top:.5rem;}
  #comments{margin-top:1rem;}
  .comment{background:#161b22;padding:.8rem;border-radius:8px;margin-bottom:.5rem;}
  #addComment{display:flex;gap:.5rem;margin-top:1rem;}
  #addComment input{flex:1;padding:.5rem;border-radius:6px;border:1px solid #2f363d;background:#0d1117;color:#c9d1d9;}
</style>
</head>
<body>
<header>
  <button onclick="location.href='index.html'">العودة للصفحة الرئيسية</button>
</header>

<main>
  <h1 id="title">جارٍ التحميل...</h1>
  <p id="author"></p>
  <pre id="code"></pre>
  <button id="copyBtn">نسخ السكربت</button>

  <h2>التعليقات</h2>
  <div id="comments"></div>
  <div id="addComment">
    <input type="text" id="nameInput" placeholder="اسمك">
    <input type="text" id="commentInput" placeholder="اكتب تعليقك...">
    <button id="submitComment">إرسال</button>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
  authDomain: "ccraft-space-scripts.firebaseapp.com",
  databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
  projectId: "ccraft-space-scripts",
  storageBucket: "ccraft-space-scripts.firebasestorage.app",
  messagingSenderId: "816078027492",
  appId: "1:816078027492:web:6472cce474078fd4d90af1",
  measurementId: "G-MHDM7YYYBN"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const scriptId = params.get('id');

const titleEl = document.getElementById('title');
const codeEl = document.getElementById('code');
const authorEl = document.getElementById('author');
const copyBtn = document.getElementById('copyBtn');

const commentsDiv = document.getElementById('comments');
const nameInput = document.getElementById('nameInput');
const commentInput = document.getElementById('commentInput');
const submitComment = document.getElementById('submitComment');

async function loadScript(){
  const snap = await get(ref(db, `scripts/${scriptId}`));
  if(!snap.exists()){ titleEl.innerText="هذا السكربت غير موجود"; return; }
  const data = snap.val();
  titleEl.innerText = data.title;
  authorEl.innerText = `المؤلف: ${data.author || "مجهول"}`;
  codeEl.innerText = data.code;

  loadComments();
}

copyBtn.addEventListener('click', ()=>{
  navigator.clipboard.writeText(codeEl.innerText).then(()=>alert("تم نسخ السكربت!"));
});

async function loadComments(){
  commentsDiv.innerHTML = '';
  const snap = await get(ref(db, `scripts/${scriptId}/comments`));
  if(!snap.exists()) return;
  const data = snap.val();
  Object.values(data).forEach(c=>{
    const div = document.createElement('div');
    div.className='comment';
    div.innerText=`${c.name}: ${c.text}`;
    commentsDiv.appendChild(div);
  });
}

submitComment.addEventListener('click', async ()=>{
  const name = nameInput.value.trim();
  const text = commentInput.value.trim();
  if(!name || !text) return alert("مطلوب الاسم والنص!");
  const commentsRef = ref(db, `scripts/${scriptId}/comments`);
  await push(commentsRef, { name, text });
  commentInput.value='';
  loadComments();
});

loadScript();
</script>
</body>
</html>
