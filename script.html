<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض السكربت | CCRAFT SPACE</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ... (نفس الستايل السابق لضمان الحفاظ على الشكل) ... */
.script-layout { max-width: 900px; margin: 0 auto; padding: 0 20px 80px; display: grid; grid-template-columns: 1fr 300px; gap: 24px; align-items: start; }
.script-main { min-width: 0; }
.script-hero { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px; padding: 28px 28px 24px; margin-bottom: 20px; position: relative; overflow: hidden; }
.script-hero::before { content: ''; position: absolute; top: 0; right: 0; width: 5px; height: 100%; background: var(--accent-gradient); border-radius: 0 24px 24px 0; }
.script-title { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 900; color: var(--text-main); margin-bottom: 14px; line-height: 1.3; padding-left: 12px; }
.author-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; cursor: pointer; width: fit-content; }
.author-row:hover .author-name { color: var(--primary); }
.author-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(139,92,246,0.3); overflow: hidden; flex-shrink: 0; background: #0a0a14; display: flex; align-items: center; justify-content: center; }
.author-info { display: flex; flex-direction: column; gap: 2px; }
.author-name { font-size: 0.92rem; font-weight: 800; color: var(--text-main); }
.author-date { font-size: 0.72rem; color: var(--text-muted); }
.tags-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 50px; font-size: 0.72rem; font-weight: 800; }
.tag-cat { background: var(--primary-dim); color: #b48bf8; border: 1px solid rgba(139,92,246,0.2); }
.tag-map { background: rgba(0,242,254,0.07); color: var(--secondary); border: 1px solid rgba(0,242,254,0.2); }
.code-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; overflow: hidden; margin-bottom: 20px; }
.code-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border-color); }
#code { background: #000 !important; margin: 0; padding: 22px 20px; color: #4ade80; font-family: 'Fira Code', monospace; font-size: 0.85rem; line-height: 1.8; direction: ltr; text-align: left; overflow-x: auto; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
.desc-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 18px; padding: 20px 22px; margin-bottom: 20px; }
.action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
.action-row button { border-radius: var(--radius-btn); padding: 12px 22px; font-size: 0.9rem; }
#copyBtn { background: var(--accent-gradient); color: white; border: none; }
.comments-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 22px; }
#comments { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.comment-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 14px; }
.comment-avatar { width: 34px; height: 34px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #0a0a14; border: 1.5px solid rgba(139,92,246,0.25); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.comment-name { font-size: 0.82rem; font-weight: 800; color: var(--primary); cursor: pointer; }
.script-sidebar { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 100px; }
.author-card-side { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 18px; padding: 20px; text-align: center; cursor: pointer; }
.acs-avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid rgba(139,92,246,0.3); overflow: hidden; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; }
.acs-btn { background: var(--primary-dim); color: var(--primary); border: 1px solid rgba(139,92,246,0.25); border-radius: 50px; padding: 7px 18px; font-size: 0.78rem; font-weight: 800; cursor: pointer; margin-top: 12px; }

@media (max-width: 720px) { .script-layout { grid-template-columns: 1fr; } .script-sidebar { position: static; order: -1; display: grid; grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<header>
    <button class="nav-button" onclick="location.href='index.html'">العودة للرئيسية</button>
</header>

<div class="script-layout">
    <div class="script-main">
        <div class="script-hero">
            <h1 class="script-title" id="title">جارٍ التحميل...</h1>
            <div class="author-row" id="authorRow">
                <div class="author-avatar" id="authorAvatarInline"></div>
                <div class="author-info">
                    <span class="author-name" id="authorName">—</span>
                    <span class="author-date" id="scriptDate">—</span>
                </div>
            </div>
            <div class="tags-row" id="tagsRow"></div>
        </div>

        <div class="code-card">
            <div class="code-header">
                <span class="ch-label">script.lua</span>
                <button class="copy-inline" id="copyInline">📋 نسخ</button>
            </div>
            <pre id="code">جارٍ التحميل...</pre>
        </div>

        <div class="desc-card">
            <h3>📝 الوصف</h3>
            <p id="description">—</p>
        </div>

        <div class="action-row">
            <button id="copyBtn">📋 نسخ السكربت</button>
            <button id="rawBtn">📄 Raw</button>
        </div>

        <div class="comments-card">
            <h3>💬 التعليقات (<span id="commentCount">0</span>)</h3>
            <div id="comments"></div>
            <div id="addComment">
                <input type="text" id="commentInput" placeholder="اكتب تعليقك...">
                <button id="submitComment">إرسال</button>
            </div>
        </div>
    </div>

    <aside class="script-sidebar">
        <div class="map-card-side" id="mapCardSide">
            <span class="mcs-icon">⏳</span>
            <div class="mcs-name muted">جارٍ التحميل...</div>
        </div>

        <div class="author-card-side" id="authorCardSide">
            <div class="acs-avatar" id="authorAvatarSide"></div>
            <div class="acs-name"  id="acName">—</div>
            <button class="acs-btn" id="viewProfileBtn">👤 عرض البروفايل</button>
        </div>
    </aside>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, get, push, onChildAdded } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
import { buildAvatar, DEFAULT_CHAR } from './avatar.js';

const firebaseConfig = {
    apiKey: "AIzaSyD5GP4AjhiruLww-9Ow2DC3JCKyRUNKdz4",
    authDomain: "ccraft-space-scripts.firebaseapp.com",
    databaseURL: "https://ccraft-space-scripts-default-rtdb.firebaseio.com",
    projectId: "ccraft-space-scripts",
    storageBucket: "ccraft-space-scripts.firebasestorage.app",
    messagingSenderId: "816078027492",
    appId: "1:816078027492:web:6472cce474078fd4d90af1",
};

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);

const params   = new URLSearchParams(window.location.search);
const scriptId = params.get('id');
let currentUser = null;

onAuthStateChanged(auth, user => {
    if (!user) { alert("يجب تسجيل الدخول أولاً"); location.href = "login.html"; return; }
    currentUser = user;
    loadScript();
});

async function getAvatar(uid, size = 40) {
    if (!uid) return buildAvatar(DEFAULT_CHAR, size);
    try {
        const snap = await get(ref(db, `users/${uid}/avatar`));
        const char = snap.exists() ? { ...DEFAULT_CHAR, ...snap.val() } : DEFAULT_CHAR;
        return buildAvatar(char, size);
    } catch { return buildAvatar(DEFAULT_CHAR, size); }
}

async function loadScript() {
    const snap = await get(ref(db, `scripts/${scriptId}`));
    if (!snap.exists()) return;
    const data = snap.val();

    document.getElementById('title').innerText = data.title;
    document.getElementById('code').innerText = data.code;
    document.getElementById('description').innerText = data.description || "لا يوجد وصف";
    document.getElementById('authorName').innerText = data.author || 'مجهول';
    document.getElementById('acName').innerText = data.author || 'مجهول';

    const avatarSVG_sm = await getAvatar(data.authorUid, 40);
    const avatarSVG_lg = await getAvatar(data.authorUid, 70);
    document.getElementById('authorAvatarInline').innerHTML = avatarSVG_sm;
    document.getElementById('authorAvatarSide').innerHTML = avatarSVG_lg;

    // دالة التوجيه للبروفايل - نستخدم UID الناشر مباشرة
    const targetAuthorUid = data.authorUid;
    const goProfile = () => { 
        if (targetAuthorUid) {
            console.log("Redirecting to author profile:", targetAuthorUid);
            window.location.href = `profile.html?uid=${targetAuthorUid}`;
        }
    };

    document.getElementById('authorRow').onclick = goProfile;
    document.getElementById('authorCardSide').onclick = goProfile;
    document.getElementById('viewProfileBtn').onclick = (e) => { e.stopPropagation(); goProfile(); };

    loadComments();
}

async function loadComments() {
    const commentsDiv = document.getElementById('comments');
    commentsDiv.innerHTML = '';
    
    onChildAdded(ref(db, `scripts/${scriptId}/comments`), async snapshot => {
        const c = snapshot.val();
        const avatarSVG = await getAvatar(c.uid, 34);
        const item = document.createElement('div');
        item.className = 'comment-item';
        
        item.innerHTML = `
            <div class="comment-avatar">${avatarSVG}</div>
            <div class="comment-body">
                <div class="comment-meta">
                    <span class="comment-name">${c.name || 'مجهول'}</span>
                </div>
                <div class="comment-text">${c.text}</div>
            </div>
        `;

        // التوجيه لبروفايل صاحب التعليق - نستخدم c.uid الخاص بالتعليق
        const commentOwnerUid = c.uid;
        const goCommentProfile = () => {
            if (commentOwnerUid) {
                console.log("Redirecting to commenter profile:", commentOwnerUid);
                window.location.href = `profile.html?uid=${commentOwnerUid}`;
            }
        };

        item.querySelector('.comment-avatar').onclick = goCommentProfile;
        item.querySelector('.comment-name').onclick = goCommentProfile;
        commentsDiv.appendChild(item);
        
        document.getElementById('commentCount').innerText = document.querySelectorAll('.comment-item').length;
    });
}

document.getElementById('submitComment').onclick = async () => {
    const text = document.getElementById('commentInput').value.trim();
    if (!text) return;
    await push(ref(db, `scripts/${scriptId}/comments`), {
        name: currentUser.email.split("@")[0],
        uid: currentUser.uid,
        text,
        timestamp: Date.now(),
    });
    document.getElementById('commentInput').value = '';
};

document.getElementById('copyBtn').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('code').innerText).then(() => alert("تم النسخ!"));
};
</script>
</body>
</html>
